<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>SpeakChain · Мій шлях</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg:      #0d0d14;
    --bg2:     #16161f;
    --bg3:     #1e1e2a;
    --purple:  #7c6ef7;
    --green:   #5ad8a6;
    --orange:  #f7a35c;
    --text:    #eaeaf5;
    --text2:   #8888a8;
    --border:  rgba(255,255,255,0.07);
  }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    min-height: 100vh; padding-bottom: 48px;
  }

  /* ── Header ── */
  .hdr {
    position: sticky; top: 0; z-index: 20;
    background: var(--bg);
    border-bottom: 0.5px solid var(--border);
    padding: 18px 16px 14px;
  }
  .hdr-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .hdr-name { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
  .hdr-level {
    background: var(--purple); color: #fff;
    font-size: 11px; font-weight: 700;
    padding: 3px 11px; border-radius: 20px; letter-spacing: 0.5px;
  }

  /* ── A1 → C2 Journey slider ── */
  .journey {
    padding: 14px 16px 4px;
    background: var(--bg);
  }
  .journey-label {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 8px;
  }
  .journey-title { font-size: 11px; color: var(--text2); font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }
  .journey-pct   { font-size: 12px; color: var(--green); font-weight: 700; }
  .journey-track {
    position: relative;
    height: 8px; background: var(--bg3); border-radius: 8px; overflow: visible;
    margin-bottom: 8px;
  }
  .journey-fill {
    height: 100%; border-radius: 8px;
    background: linear-gradient(90deg, #5ad8a6, #7c6ef7, #f7a35c);
    transition: width 1s cubic-bezier(.4,0,.2,1);
    position: relative;
  }
  /* Бігунок */
  .journey-thumb {
    position: absolute; right: -8px; top: 50%;
    transform: translateY(-50%);
    width: 18px; height: 18px; border-radius: 50%;
    background: #fff;
    border: 3px solid var(--purple);
    box-shadow: 0 0 8px rgba(124,110,247,0.6);
    transition: right 1s cubic-bezier(.4,0,.2,1);
  }
  /* Мітки рівнів */
  .journey-marks {
    display: flex; justify-content: space-between;
    padding: 0 2px;
  }
  .journey-mark {
    font-size: 10px; font-weight: 600;
    color: var(--text2); text-align: center;
    transition: color 0.3s;
    min-width: 24px;
  }
  .journey-mark.done    { color: var(--green); }
  .journey-mark.current { color: var(--purple); }
  .journey-mark.goal    { color: var(--orange); }

  /* ── Overall bar ── */
  .overall-track { background: var(--bg3); border-radius: 6px; height: 5px; overflow: hidden; margin-top: 8px; }
  .overall-fill {
    height: 100%; border-radius: 6px;
    background: linear-gradient(90deg, var(--purple), var(--green));
    transition: width 0.9s cubic-bezier(.4,0,.2,1);
  }
  .overall-meta {
    display: flex; justify-content: space-between;
    font-size: 11px; color: var(--text2); margin-top: 5px;
  }

  /* ── Streak ── */
  .streak-strip {
    display: flex; gap: 8px; align-items: center;
    padding: 10px 16px;
    background: rgba(247,163,92,0.07);
    border-bottom: 0.5px solid rgba(247,163,92,0.15);
    font-size: 13px;
  }
  .streak-strip span { color: var(--orange); font-weight: 600; }

  /* ── Tabs ── */
  .tabs {
    display: flex; gap: 6px;
    padding: 12px 16px 4px;
    overflow-x: auto; scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0; padding: 6px 14px;
    border-radius: 20px; font-size: 12px; font-weight: 600;
    cursor: pointer; border: 0.5px solid var(--border);
    background: var(--bg2); color: var(--text2);
    transition: all 0.2s;
  }
  .tab.active { background: var(--purple); border-color: var(--purple); color: #fff; }
  .tab.done   { border-color: var(--green); color: var(--green); }
  .tab.locked { opacity: 0.4; }

  /* ── Stats ── */
  .section { padding: 14px 16px; }
  .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .stat {
    background: var(--bg2); border-radius: 12px;
    padding: 12px 10px; border: 0.5px solid var(--border); text-align: center;
  }
  .stat-v { font-size: 20px; font-weight: 700; }
  .stat-v.p { color: var(--purple); }
  .stat-v.g { color: var(--green); }
  .stat-v.o { color: var(--orange); }
  .stat-l { font-size: 10px; color: var(--text2); margin-top: 3px; }

  /* ── Level progress ── */
  .lvl-progress {
    background: var(--bg2); border-radius: 12px;
    padding: 12px 14px; border: 0.5px solid var(--border); margin-bottom: 10px;
  }
  .lvl-progress-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .lvl-progress-name { font-size: 13px; font-weight: 600; }
  .lvl-progress-pct  { font-size: 13px; font-weight: 700; color: var(--green); }
  .lvl-track { background: var(--bg3); border-radius: 4px; height: 5px; overflow: hidden; }
  .lvl-fill  { height: 100%; border-radius: 4px; background: var(--green); transition: width 0.9s cubic-bezier(.4,0,.2,1); }
  .lvl-hint  { font-size: 11px; color: var(--text2); margin-top: 6px; }

  /* ── Next topic ── */
  .next-banner {
    background: rgba(124,110,247,0.08); border: 0.5px solid rgba(124,110,247,0.3);
    border-radius: 12px; padding: 12px 14px; margin-bottom: 10px;
  }
  .next-label { font-size: 10px; color: var(--purple); font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 4px; }
  .next-name  { font-size: 15px; font-weight: 600; }
  .next-hint  { font-size: 11px; color: var(--text2); margin-top: 3px; }

  /* ── Topics ── */
  .topics-title {
    font-size: 10px; font-weight: 700; color: var(--text2);
    letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px;
  }
  .topic {
    display: flex; align-items: center; gap: 10px;
    background: var(--bg2); border-radius: 10px;
    padding: 10px 12px; margin-bottom: 6px;
    border: 0.5px solid var(--border);
  }
  .topic.done    { border-color: rgba(90,216,166,0.25); background: rgba(90,216,166,0.04); }
  .topic.current { border-color: rgba(124,110,247,0.4); background: rgba(124,110,247,0.06); }
  .topic-num { width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; background: var(--bg3); }
  .topic.done    .topic-num { background: rgba(90,216,166,0.15); }
  .topic.current .topic-num { background: rgba(124,110,247,0.15); }
  .topic-name { font-size: 12px; font-weight: 500; flex: 1; min-width: 0; }
  .topic-badge { font-size: 10px; font-weight: 600; flex-shrink: 0; padding: 2px 7px; border-radius: 10px; }
  .topic.done    .topic-badge { color: var(--green); }
  .topic.current .topic-badge { color: var(--purple); }
  .topic.locked  .topic-badge { color: var(--text2); }

  .close-btn {
    width: calc(100% - 32px); margin: 8px 16px 0;
    padding: 13px; background: var(--purple);
    color: #fff; font-size: 15px; font-weight: 600;
    border: none; border-radius: 12px;
    cursor: pointer; transition: opacity 0.2s;
  }
  .close-btn:active { opacity: 0.8; }
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-top">
    <div class="hdr-name" id="hdr-name">Завантаження...</div>
    <div class="hdr-level" id="hdr-level">—</div>
  </div>
  <div class="overall-track">
    <div class="overall-fill" id="overall-fill" style="width:0%"></div>
  </div>
  <div class="overall-meta">
    <span id="overall-left">Загальний прогрес</span>
    <span id="overall-right">0%</span>
  </div>
</div>

<!-- A1 → C2 Journey Slider -->
<div class="journey">
  <div class="journey-label">
    <span class="journey-title">Шлях A1 → C2</span>
    <span class="journey-pct" id="journey-pct">0%</span>
  </div>
  <div class="journey-track">
    <div class="journey-fill" id="journey-fill" style="width:0%">
      <div class="journey-thumb"></div>
    </div>
  </div>
  <div class="journey-marks" id="journey-marks"></div>
</div>

<div class="streak-strip" id="streak-strip" style="display:none">
  🔥 Стрік: <span id="streak-val">0</span> днів поспіль
  &nbsp;·&nbsp; Рекорд: <span id="streak-best">0</span>
</div>

<div class="tabs" id="tabs"></div>

<div class="section">
  <div class="stats-row" id="stats-row"></div>
  <div id="lvl-progress"></div>
  <div id="next-banner"></div>
  <div class="topics-title">Теми рівня</div>
  <div id="topics-list"></div>
</div>

<button class="close-btn" onclick="Telegram.WebApp.close()">Закрити</button>

<script>
const DEFAULT_GRAMMAR = {
  A1: ["The ABC, spelling","The Numbers","a / an","Countable nouns with a/an and some","Present Simple","Present Continuous","Non-Continuous Verbs (stative)","Imperative Mood","Possessive Case ('s / s')","In, on, at — time","Comparative and Superlative Degrees","Zero Conditional","Modal Verbs: basic (can/must/should)","Going to (future plans)","Question Tags"],
  A2: ["Past Simple","Future Simple (will)","The (definite article)","Uncountable nouns","Few, little, a few, a little, much, many","Adverbs","As … as / Than","Used to","First Conditional","Gerund + V (basic)","Infinitive + V (basic)","Modal Verbs: extended (might/may/have to/could)"],
  B1: ["Present Perfect","Present Perfect Continuous","Past Continuous","Passive Voice (Present & Past)","Second Conditional","Enough and too","Because / Because of","Despite / In spite of","As soon as / As long as","Gerund + V (full system)","Infinitive + V (full system)","Would rather / sooner / better","Be used to / Get used to","Either … or / Neither … nor","Modal Verbs: advanced (must have / can't have / should have)","Reported Speech"],
  B2: ["Past Perfect","Past Perfect Continuous","Future Perfect","Future Continuous","Future Perfect Continuous","Third Conditional","Passive Voice (Continuous)","Participle 1 (Present Participle)","Participle 2 (Past Participle)","It is said that …","Complex Object","Everyone, everybody / Either, neither of + Prep","Wish / If only","Mixed Conditionals"],
  C1: ["He is said to / He is supposed to","Complex Subject","The Prepositional Infinitive Complex","Inversion (emphatic structures)","Cleft Sentences"],
  C2: ["Stylistic inversion for literary effect","Nuanced modal meanings (epistemic / deontic / dynamic)","Advanced ellipsis in complex discourse","Rhetoric devices (anaphora, chiasmus, litotes)","Discourse cohesion across paragraphs","Irony, understatement and euphemism in context","Complex syntax: multiple embedded clauses","Idiomatic and colloquial precision","Lexical density and academic register","Pragmatics: implicature and indirect speech acts"]
};
const DEFAULT_LEVEL_NAMES = {A1:"Beginner A1",A2:"Elementary A2",B1:"Intermediate B1",B2:"Upper-Intermediate B2",C1:"Advanced C1",C2:"Proficiency C2"};
const DEFAULT_LEVELS = ["A1","A2","B1","B2","C1","C2"];

let D = {};
let activeLevel = "A1";

function init() {
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
  try {
    const raw = new URLSearchParams(window.location.search).get("d");
    if (raw) D = JSON.parse(decodeURIComponent(raw));
  } catch(e) {}
  if (!D.cefr_grammar) D.cefr_grammar = DEFAULT_GRAMMAR;
  if (!D.levels)       D.levels       = DEFAULT_LEVELS;
  if (!D.level_names)  D.level_names  = DEFAULT_LEVEL_NAMES;
  if (!D.mastered)     D.mastered     = [];
  if (!D.level)        D.level        = "A1";
  activeLevel = D.level;
  render();
}

function render() {
  const mastered   = D.mastered || [];
  const levels     = D.levels   || DEFAULT_LEVELS;
  const levelNames = D.level_names || DEFAULT_LEVEL_NAMES;
  const grammar    = D.cefr_grammar || DEFAULT_GRAMMAR;
  const allTopics  = levels.flatMap(l => grammar[l] || []);
  const totalDone  = mastered.length;
  const totalAll   = allTopics.length;
  const overallPct = totalAll ? Math.round(totalDone / totalAll * 100) : 0;

  // Header
  document.getElementById("hdr-name").textContent  = D.name || "Студент";
  document.getElementById("hdr-level").textContent = activeLevel;
  document.getElementById("overall-fill").style.width = overallPct + "%";
  document.getElementById("overall-left").textContent = totalDone + " / " + totalAll + " тем";
  document.getElementById("overall-right").textContent = overallPct + "%";

  // ── Journey A1→C2 slider ──
  const curIdx   = levels.indexOf(D.level);
  // Рахуємо позицію бігунка по темах до поточного рівня
  let topicsBeforeCurrent = 0;
  for (let i = 0; i < curIdx; i++) {
    topicsBeforeCurrent += (grammar[levels[i]] || []).length;
  }
  const curLvlTopics  = grammar[D.level] || [];
  const curLvlDone    = curLvlTopics.filter(t => mastered.includes(t)).length;
  const journeyDone   = topicsBeforeCurrent + curLvlDone;
  const journeyPct    = totalAll ? Math.round(journeyDone / totalAll * 100) : 0;
  document.getElementById("journey-pct").textContent  = journeyPct + "%";
  document.getElementById("journey-fill").style.width = journeyPct + "%";

  // Мітки рівнів на слайдері
  const marksEl = document.getElementById("journey-marks");
  marksEl.innerHTML = "";
  levels.forEach((lvl, i) => {
    const lvlTopics = grammar[lvl] || [];
    const lvlDone   = lvlTopics.filter(t => mastered.includes(t)).length;
    const isAll     = lvlDone === lvlTopics.length && lvlTopics.length > 0;
    const isCur     = lvl === D.level;
    const isGoal    = lvl === "C2";
    const mark      = document.createElement("div");
    mark.className  = "journey-mark" +
      (isAll ? " done" : "") +
      (isCur ? " current" : "") +
      (isGoal && !isAll ? " goal" : "");
    mark.textContent = lvl + (isAll ? "✓" : "");
    if (isGoal && !isAll) mark.textContent = "C2 👑";
    marksEl.appendChild(mark);
  });

  // Streak
  const streak = D.streak || 0;
  if (streak > 0) {
    document.getElementById("streak-strip").style.display = "flex";
    document.getElementById("streak-val").textContent  = streak;
    document.getElementById("streak-best").textContent = D.best_streak || 0;
  }

  // Tabs
  const tabsEl = document.getElementById("tabs");
  tabsEl.innerHTML = "";
  levels.forEach((lvl, i) => {
    const topics = grammar[lvl] || [];
    const done   = topics.filter(t => mastered.includes(t)).length;
    const isAll  = done === topics.length && topics.length > 0;
    const isLocked = i > curIdx;
    const tab    = document.createElement("div");
    tab.className = "tab" +
      (lvl === activeLevel ? " active" : "") +
      (isAll ? " done" : "") +
      (isLocked ? " locked" : "");
    tab.textContent = lvl + (isAll ? " ✓" : " " + done + "/" + topics.length);
    tab.onclick = () => { activeLevel = lvl; renderLevel(); };
    tabsEl.appendChild(tab);
  });

  renderLevel();
}

function renderLevel() {
  const mastered   = D.mastered || [];
  const levels     = D.levels   || DEFAULT_LEVELS;
  const levelNames = D.level_names || DEFAULT_LEVEL_NAMES;
  const grammar    = D.cefr_grammar || DEFAULT_GRAMMAR;
  const curIdx     = levels.indexOf(D.level);
  const tabIdx     = levels.indexOf(activeLevel);
  const lvlTopics  = grammar[activeLevel] || [];
  const lvlDone    = lvlTopics.filter(t => mastered.includes(t)).length;
  const lvlPct     = lvlTopics.length ? Math.round(lvlDone / lvlTopics.length * 100) : 0;
  const scores     = D.scores || [];
  const avgScore   = scores.length ? Math.round(scores.reduce((a,b)=>a+b,0)/scores.length) : 0;

  document.getElementById("stats-row").innerHTML =
    '<div class="stat"><div class="stat-v p">' + lvlDone + '/' + lvlTopics.length + '</div><div class="stat-l">Тем ' + activeLevel + '</div></div>' +
    '<div class="stat"><div class="stat-v g">' + (avgScore || "—") + '</div><div class="stat-l">Середній бал</div></div>' +
    '<div class="stat"><div class="stat-v o">' + (D.done_lessons || 0) + '</div><div class="stat-l">Уроків</div></div>';

  const topicsLeft = lvlTopics.length - lvlDone;
  const nextLevel  = levels[tabIdx + 1];
  const hintText   = nextLevel && topicsLeft > 0
    ? "До " + (levelNames[nextLevel] || nextLevel) + ": ще " + topicsLeft + " тем"
    : (topicsLeft === 0 ? "Рівень пройдено! 🎉" : "");

  document.getElementById("lvl-progress").innerHTML =
    '<div class="lvl-progress">' +
      '<div class="lvl-progress-top">' +
        '<div class="lvl-progress-name">' + (levelNames[activeLevel] || activeLevel) + '</div>' +
        '<div class="lvl-progress-pct">' + lvlPct + '%</div>' +
      '</div>' +
      '<div class="lvl-track"><div class="lvl-fill" style="width:' + lvlPct + '%"></div></div>' +
      (hintText ? '<div class="lvl-hint">' + hintText + '</div>' : '') +
    '</div>';

  const nextTopic = lvlTopics.find(t => !mastered.includes(t));
  const bannerEl  = document.getElementById("next-banner");
  if (nextTopic && activeLevel === D.level) {
    bannerEl.innerHTML =
      '<div class="next-banner">' +
        '<div class="next-label">Наступна тема</div>' +
        '<div class="next-name">' + nextTopic + '</div>' +
        '<div class="next-hint">Натисни "🚀 Рухатись далі" в боті</div>' +
      '</div>';
  } else {
    bannerEl.innerHTML = "";
  }

  let firstNext = true;
  document.getElementById("topics-list").innerHTML = lvlTopics.map((topic, i) => {
    const isDone   = mastered.includes(topic);
    const isLocked = tabIdx > curIdx;
    const isCur    = !isDone && !isLocked && firstNext;
    if (isCur) firstNext = false;
    const cls   = isDone ? "done" : (isCur ? "current" : "locked");
    const icon  = isDone ? "✅" : (isCur ? "▶️" : "○");
    const badge = isDone ? "✓ Пройдено" : (isCur ? "Наступна" : "Попереду");
    return '<div class="topic ' + cls + '"><div class="topic-num">' + icon + '</div>' +
           '<div class="topic-name">' + (i+1) + '. ' + topic + '</div>' +
           '<div class="topic-badge">' + badge + '</div></div>';
  }).join("");
}

init();
</script>
</body>
</html>
