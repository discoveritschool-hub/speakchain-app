<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SpeakChain Analytics</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg:#0f0f0f;--surface:#1a1a1a;--surface2:#242424;
  --border:rgba(255,255,255,0.08);--text:#f0f0f0;--text2:#888;--text3:#444;
  --accent:#4f8ef7;--green:#3ecf8e;--amber:#f59e0b;--red:#ef4444;--purple:#a78bfa;
  --r:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;font-size:14px;overflow-x:hidden}

/* ── Header ── */
.header{padding:14px 16px 0;display:flex;align-items:center;justify-content:space-between}
.header-title{font-size:18px;font-weight:700;letter-spacing:-.4px}
.header-sub{font-size:12px;color:var(--text2);margin-top:2px}
.refresh-btn{width:34px;height:34px;border-radius:50%;background:var(--surface);
  border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px}

/* ── Tabs ── */
.tabs{display:flex;gap:0;padding:12px 16px 0;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:7px 14px;border-radius:20px;font-size:12px;font-weight:600;
  cursor:pointer;color:var(--text2);border:1px solid transparent;transition:all .15s}
.tab.active{background:var(--accent);color:#fff}

/* ── Content ── */
.content{padding:14px 16px 80px;overflow-y:auto;height:calc(100vh - 100px);scrollbar-width:none}
.content::-webkit-scrollbar{display:none}
.section{display:none}
.section.active{display:block}

/* ── Stat cards ── */
.cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px}
.card-label{font-size:11px;color:var(--text2);font-weight:500;text-transform:uppercase;letter-spacing:.05em}
.card-value{font-size:24px;font-weight:700;letter-spacing:-.5px;margin-top:4px}
.card-delta{font-size:11px;margin-top:3px}
.card.accent{border-color:rgba(79,142,247,.3);background:rgba(79,142,247,.08)}
.card.green{border-color:rgba(62,207,142,.3);background:rgba(62,207,142,.08)}
.card.amber{border-color:rgba(245,158,11,.3);background:rgba(245,158,11,.08)}
.card.purple{border-color:rgba(167,139,250,.3);background:rgba(167,139,250,.08)}
.delta-up{color:var(--green)}
.delta-down{color:var(--red)}
.delta-flat{color:var(--text3)}

/* ── Chart blocks ── */
.chart-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  padding:14px;margin-bottom:12px}
.chart-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:12px}
.chart-sub{font-size:11px;color:var(--text2);margin-top:-8px;margin-bottom:10px}
.chart-wrap{position:relative;height:180px}

/* ── Funnel ── */
.funnel{display:flex;flex-direction:column;gap:6px}
.funnel-row{display:flex;align-items:center;gap:10px}
.funnel-label{font-size:12px;color:var(--text2);width:60px;flex-shrink:0;text-align:right}
.funnel-bar-wrap{flex:1;background:var(--surface2);border-radius:4px;height:28px;overflow:hidden;position:relative}
.funnel-bar{height:100%;border-radius:4px;display:flex;align-items:center;padding:0 10px;
  font-size:12px;font-weight:600;color:#fff;white-space:nowrap;transition:width .6s ease}
.funnel-pct{font-size:11px;color:var(--text2);width:40px;flex-shrink:0;text-align:right}

/* ── Table ── */
.table-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  padding:14px;margin-bottom:12px;overflow-x:auto}
.table-title{font-size:13px;font-weight:600;margin-bottom:10px}
table{width:100%;border-collapse:collapse}
th{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;
  letter-spacing:.05em;padding:0 8px 8px;text-align:left;white-space:nowrap}
td{font-size:12px;color:var(--text);padding:7px 8px;border-top:1px solid var(--border);white-space:nowrap}
tr:hover td{background:var(--surface2)}

/* ── Retention heatmap ── */
.retention-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:3px;margin-top:8px}
.ret-header{font-size:10px;color:var(--text3);text-align:center;padding:4px 0;font-weight:600}
.ret-cell{aspect-ratio:1;border-radius:3px;display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:600;color:#fff}

/* ── Loading ── */
.loading{display:flex;align-items:center;justify-content:center;height:200px;
  flex-direction:column;gap:12px;color:var(--text2);font-size:13px}
.spinner{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--accent);
  border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Error ── */
.error-box{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);
  border-radius:var(--r);padding:14px;color:var(--red);font-size:13px;text-align:center}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">📈 Analytics</div>
    <div class="header-sub" id="last-updated">Завантаження...</div>
  </div>
  <div class="refresh-btn" onclick="loadData()">↻</div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('overview')">Огляд</div>
  <div class="tab" onclick="switchTab('retention')">Retention</div>
  <div class="tab" onclick="switchTab('funnel')">Funnel</div>
  <div class="tab" onclick="switchTab('revenue')">Revenue</div>
  <div class="tab" onclick="switchTab('buddy')">Buddy</div>
  <div class="tab" onclick="switchTab('bloggers')">Блогери</div>
</div>

<div class="content">

  <!-- OVERVIEW -->
  <div class="section active" id="tab-overview">
    <div id="overview-content">
      <div class="loading"><div class="spinner"></div>Завантаження...</div>
    </div>
  </div>

  <!-- RETENTION -->
  <div class="section" id="tab-retention">
    <div id="retention-content">
      <div class="loading"><div class="spinner"></div>Завантаження...</div>
    </div>
  </div>

  <!-- FUNNEL -->
  <div class="section" id="tab-funnel">
    <div id="funnel-content">
      <div class="loading"><div class="spinner"></div>Завантаження...</div>
    </div>
  </div>

  <!-- REVENUE -->
  <div class="section" id="tab-revenue">
    <div id="revenue-content">
      <div class="loading"><div class="spinner"></div>Завантаження...</div>
    </div>
  </div>

  <!-- BUDDY -->
  <div class="section" id="tab-buddy">
    <div id="buddy-content">
      <div class="loading"><div class="spinner"></div>Завантаження...</div>
    </div>
  </div>

  <!-- BLOGGERS -->
  <div class="section" id="tab-bloggers">
    <div id="bloggers-content">
      <div class="loading"><div class="spinner"></div>Завантаження...</div>
    </div>
  </div>

</div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

let charts = {};
let data = null;
let activeTab = 'overview';

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['overview','retention','funnel','revenue','buddy','bloggers'][i] === tab);
  });
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
  if (data) renderTab(tab);
}

async function loadData() {
  document.getElementById('last-updated').textContent = 'Завантаження...';
  try {
    const res = await fetch('/admin_analytics', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({init_data: tg?.initData || ''})
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    data = await res.json();
    if (data.error) throw new Error(data.error);
    const now = new Date().toLocaleTimeString('uk-UA', {hour:'2-digit', minute:'2-digit'});
    document.getElementById('last-updated').textContent = `Оновлено ${now}`;
    renderTab(activeTab);
    // Пре-рендеримо всі вкладки у фоні
    ['overview','retention','funnel','revenue','buddy','bloggers'].forEach(t => {
      if (t !== activeTab) renderTab(t);
    });
  } catch(e) {
    ['overview','retention','funnel','revenue','buddy'].forEach(t => {
      document.getElementById(`${t}-content`).innerHTML =
        `<div class="error-box">❌ ${e.message}</div>`;
    });
    document.getElementById('last-updated').textContent = 'Помилка завантаження';
  }
}

function renderTab(tab) {
  const el = document.getElementById(`${tab}-content`);
  if (!data) return;
  switch(tab) {
    case 'overview':   el.innerHTML = renderOverview(); break;
    case 'retention':  el.innerHTML = renderRetention(); break;
    case 'funnel':     el.innerHTML = renderFunnel(); break;
    case 'revenue':    el.innerHTML = renderRevenue(); break;
    case 'buddy':      el.innerHTML = renderBuddy(); break;
    case 'bloggers':   el.innerHTML = renderBloggers(); break;
  }
  setTimeout(() => drawCharts(tab), 50);
}

// ── OVERVIEW ─────────────────────────────────────────────
function renderOverview() {
  const d = data.overview;
  return `
  <div class="cards">
    <div class="card accent">
      <div class="card-label">Всього юзерів</div>
      <div class="card-value" style="color:var(--accent)">${fmt(d.total_users)}</div>
      <div class="card-delta delta-up">+${fmt(d.new_today)} сьогодні</div>
    </div>
    <div class="card green">
      <div class="card-label">Активні сьогодні</div>
      <div class="card-value" style="color:var(--green)">${fmt(d.active_today)}</div>
      <div class="card-delta delta-flat">${pct(d.active_today, d.total_users)} від бази</div>
    </div>
    <div class="card amber">
      <div class="card-label">Платних</div>
      <div class="card-value" style="color:var(--amber)">${fmt(d.paid_users)}</div>
      <div class="card-delta delta-flat">${pct(d.paid_users, d.total_users)} конверсія</div>
    </div>
    <div class="card purple">
      <div class="card-label">В тріалі</div>
      <div class="card-value" style="color:var(--purple)">${fmt(d.trial_users)}</div>
      <div class="card-delta delta-flat">${pct(d.trial_users, d.total_users)} від бази</div>
    </div>
  </div>

  <div class="cards">
    <div class="card">
      <div class="card-label">Нових за 7 днів</div>
      <div class="card-value">${fmt(d.new_7d)}</div>
    </div>
    <div class="card">
      <div class="card-label">Нових за 30 днів</div>
      <div class="card-value">${fmt(d.new_30d)}</div>
    </div>
    <div class="card">
      <div class="card-label">Chain breaks сьогодні</div>
      <div class="card-value" style="color:var(--red)">${fmt(d.chain_breaks_today)}</div>
    </div>
    <div class="card">
      <div class="card-label">Середній chain</div>
      <div class="card-value">${d.avg_chain} дн.</div>
    </div>
  </div>

  <div class="chart-block">
    <div class="chart-title">Нові реєстрації (30 днів)</div>
    <div class="chart-wrap"><canvas id="chart-registrations"></canvas></div>
  </div>

  <div class="chart-block">
    <div class="chart-title">Активні юзери (30 днів)</div>
    <div class="chart-wrap"><canvas id="chart-active"></canvas></div>
  </div>`;
}

// ── RETENTION ───────────────────────────────────────────
function renderRetention() {
  const d = data.retention;
  const cohorts = d.cohorts || [];

  let heatmapHTML = `
  <div class="retention-grid">
    <div class="ret-header">Тиждень</div>
    ${['D1','D3','D7','D14','D30','D60','D90'].map(l=>`<div class="ret-header">${l}</div>`).join('')}
  `;

  cohorts.forEach(c => {
    heatmapHTML += `<div class="ret-header" style="text-align:left;font-size:10px">${c.week}</div>`;
    ['d1','d3','d7','d14','d30','d60','d90'].forEach(key => {
      const val = c[key];
      const color = val == null ? '#1a1a1a' :
        val >= 50 ? '#065f46' : val >= 30 ? '#0f766e' : val >= 15 ? '#b45309' : val >= 5 ? '#7c2d12' : '#1a1a1a';
      heatmapHTML += `<div class="ret-cell" style="background:${color}">${val != null ? val + '%' : ''}</div>`;
    });
  });
  heatmapHTML += '</div>';

  return `
  <div class="cards">
    <div class="card green">
      <div class="card-label">D1 Retention</div>
      <div class="card-value" style="color:var(--green)">${d.d1}%</div>
      <div class="card-delta delta-flat">повернулись на 2-й день</div>
    </div>
    <div class="card accent">
      <div class="card-label">D7 Retention</div>
      <div class="card-value" style="color:var(--accent)">${d.d7}%</div>
      <div class="card-delta delta-flat">активні через тиждень</div>
    </div>
    <div class="card amber">
      <div class="card-label">D30 Retention</div>
      <div class="card-value" style="color:var(--amber)">${d.d30}%</div>
      <div class="card-delta delta-flat">активні через місяць</div>
    </div>
    <div class="card purple">
      <div class="card-label">Avg Session / Day</div>
      <div class="card-value" style="color:var(--purple)">${d.avg_sessions}</div>
      <div class="card-delta delta-flat">на активного юзера</div>
    </div>
  </div>

  <div class="chart-block">
    <div class="chart-title">Retention Heatmap (когорти по тижнях)</div>
    <div class="chart-sub">% юзерів що повернулись</div>
    ${heatmapHTML}
  </div>

  <div class="chart-block">
    <div class="chart-title">Chain breaks (30 днів)</div>
    <div class="chart-wrap"><canvas id="chart-breaks"></canvas></div>
  </div>`;
}

// ── FUNNEL ──────────────────────────────────────────────
function renderFunnel() {
  const d = data.funnel;
  const steps = [
    { label: 'Registered', value: d.registered, color: '#4f8ef7' },
    { label: 'Demo',       value: d.demo,       color: '#a78bfa' },
    { label: 'Trial',      value: d.trial,      color: '#f59e0b' },
    { label: 'Paid',       value: d.paid,       color: '#3ecf8e' },
  ];
  const max = steps[0].value || 1;

  return `
  <div class="chart-block">
    <div class="chart-title">Funnel: Demo → Trial → Paid</div>
    <div class="funnel">
      ${steps.map((s, i) => {
        const w = Math.round((s.value / max) * 100);
        const convFromPrev = i > 0 ? pct(s.value, steps[i-1].value) : '100%';
        return `
        <div class="funnel-row">
          <div class="funnel-label">${s.label}</div>
          <div class="funnel-bar-wrap">
            <div class="funnel-bar" style="width:${w}%;background:${s.color}">
              ${fmt(s.value)}
            </div>
          </div>
          <div class="funnel-pct">${convFromPrev}</div>
        </div>`;
      }).join('')}
    </div>
  </div>

  <div class="cards">
    <div class="card green">
      <div class="card-label">Demo → Trial</div>
      <div class="card-value" style="color:var(--green)">${pct(d.trial, d.demo)}</div>
    </div>
    <div class="card amber">
      <div class="card-label">Trial → Paid</div>
      <div class="card-value" style="color:var(--amber)">${pct(d.paid, d.trial)}</div>
    </div>
    <div class="card accent">
      <div class="card-label">Overall</div>
      <div class="card-value" style="color:var(--accent)">${pct(d.paid, d.registered)}</div>
    </div>
    <div class="card purple">
      <div class="card-label">Avg Trial Ланок</div>
      <div class="card-value" style="color:var(--purple)">${d.avg_trial_chains}</div>
    </div>
  </div>

  <div class="table-block">
    <div class="table-title">Конверсія по джерелах</div>
    <table>
      <tr><th>Джерело</th><th>Юзерів</th><th>Платних</th><th>Conv%</th></tr>
      ${(d.sources || []).map(s => `
        <tr>
          <td>${s.name}</td>
          <td>${fmt(s.users)}</td>
          <td>${fmt(s.paid)}</td>
          <td style="color:var(--green)">${pct(s.paid, s.users)}</td>
        </tr>`).join('')}
    </table>
  </div>`;
}

// ── REVENUE ─────────────────────────────────────────────
function renderRevenue() {
  const d = data.revenue;
  return `
  <div class="cards">
    <div class="card green">
      <div class="card-label">MRR (поточний)</div>
      <div class="card-value" style="color:var(--green)">$${fmt(d.mrr)}</div>
      <div class="card-delta ${d.mrr_delta >= 0 ? 'delta-up' : 'delta-down'}">
        ${d.mrr_delta >= 0 ? '+' : ''}$${fmt(Math.abs(d.mrr_delta))} vs минулий міс
      </div>
    </div>
    <div class="card accent">
      <div class="card-label">Revenue цього місяця</div>
      <div class="card-value" style="color:var(--accent)">$${fmt(d.revenue_month)}</div>
    </div>
    <div class="card amber">
      <div class="card-label">Basic підписок</div>
      <div class="card-value" style="color:var(--amber)">${fmt(d.basic_count)}</div>
      <div class="card-delta delta-flat">по $${d.basic_price}/міс</div>
    </div>
    <div class="card purple">
      <div class="card-label">Premium підписок</div>
      <div class="card-value" style="color:var(--purple)">${fmt(d.premium_count)}</div>
      <div class="card-delta delta-flat">по $${d.premium_price}/міс</div>
    </div>
  </div>

  <div class="chart-block">
    <div class="chart-title">Revenue по місяцях</div>
    <div class="chart-wrap"><canvas id="chart-revenue"></canvas></div>
  </div>

  <div class="table-block">
    <div class="table-title">Revenue по джерелах (блогерах)</div>
    <table>
      <tr><th>Блогер</th><th>Юзерів</th><th>Платних</th><th>Revenue</th></tr>
      ${(d.bloggers || []).map(b => `
        <tr>
          <td>${b.name}</td>
          <td>${fmt(b.users)}</td>
          <td>${fmt(b.paid)}</td>
          <td style="color:var(--green)">$${fmt(b.revenue)}</td>
        </tr>`).join('')}
    </table>
  </div>

  <div class="chart-block">
    <div class="chart-title">Basic vs Premium (динаміка)</div>
    <div class="chart-wrap"><canvas id="chart-plans"></canvas></div>
  </div>`;
}

// ── BUDDY ────────────────────────────────────────────────
function renderBuddy() {
  const d = data.buddy;
  return `
  <div class="cards">
    <div class="card accent">
      <div class="card-label">Всього сесій</div>
      <div class="card-value" style="color:var(--accent)">${fmt(d.total_sessions)}</div>
      <div class="card-delta delta-up">+${fmt(d.sessions_today)} сьогодні</div>
    </div>
    <div class="card green">
      <div class="card-label">Активних юзерів</div>
      <div class="card-value" style="color:var(--green)">${fmt(d.active_users)}</div>
      <div class="card-delta delta-flat">використовували Buddy</div>
    </div>
    <div class="card amber">
      <div class="card-label">Avg повідомлень/сесія</div>
      <div class="card-value" style="color:var(--amber)">${d.avg_msgs_per_session}</div>
    </div>
    <div class="card purple">
      <div class="card-label">Топ сценарій</div>
      <div class="card-value" style="color:var(--purple);font-size:13px">${d.top_scenario || '—'}</div>
    </div>
  </div>

  <div class="chart-block">
    <div class="chart-title">Buddy сесії (30 днів)</div>
    <div class="chart-wrap"><canvas id="chart-buddy-sessions"></canvas></div>
  </div>

  <div class="table-block">
    <div class="table-title">Топ сценарії</div>
    <table>
      <tr><th>Сценарій</th><th>Сесій</th><th>Avg msg</th></tr>
      ${(d.top_scenarios || []).map(s => `
        <tr>
          <td>${s.name}</td>
          <td>${fmt(s.sessions)}</td>
          <td>${s.avg_msgs}</td>
        </tr>`).join('')}
    </table>
  </div>

  <div class="cards">
    <div class="card green">
      <div class="card-label">✓ Правильних</div>
      <div class="card-value" style="color:var(--green)">${fmt(d.feedback_good)}</div>
    </div>
    <div class="card amber">
      <div class="card-label">💡 Виправлень</div>
      <div class="card-value" style="color:var(--amber)">${fmt(d.feedback_tips)}</div>
    </div>
    <div class="card">
      <div class="card-label">Accuracy</div>
      <div class="card-value">${pct(d.feedback_good, d.feedback_good + d.feedback_tips)}</div>
    </div>
    <div class="card">
      <div class="card-label">Demo → Trial via Buddy</div>
      <div class="card-value">${pct(d.demo_converted, d.demo_users)}</div>
    </div>
  </div>`;
}

// ── CHARTS ───────────────────────────────────────────────
function drawCharts(tab) {
  const chartCfg = {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false } },
    scales: {
      x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#555', font: { size: 10 }, maxTicksLimit: 8 } },
      y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#555', font: { size: 10 } } }
    }
  };

  function makeChart(id, type, labels, datasets, extraCfg = {}) {
    const canvas = document.getElementById(id);
    if (!canvas) return;
    if (charts[id]) charts[id].destroy();
    charts[id] = new Chart(canvas.getContext('2d'), {
      type, data: { labels, datasets },
      options: { ...chartCfg, ...extraCfg }
    });
  }

  if (tab === 'overview') {
    const r = data.overview;
    makeChart('chart-registrations', 'bar', r.days_labels,
      [{ data: r.registrations_daily, backgroundColor: 'rgba(79,142,247,.6)', borderRadius: 4 }]);
    makeChart('chart-active', 'line', r.days_labels,
      [{ data: r.active_daily, borderColor: '#3ecf8e', backgroundColor: 'rgba(62,207,142,.1)',
         fill: true, tension: .4, pointRadius: 2 }]);
  }

  if (tab === 'retention') {
    const r = data.retention;
    makeChart('chart-breaks', 'bar', r.break_labels,
      [{ data: r.break_data, backgroundColor: 'rgba(239,68,68,.6)', borderRadius: 4 }]);
  }

  if (tab === 'revenue') {
    const r = data.revenue;
    makeChart('chart-revenue', 'bar', r.months_labels,
      [{ data: r.revenue_monthly, backgroundColor: 'rgba(62,207,142,.7)', borderRadius: 4 }]);
    makeChart('chart-plans', 'line', r.months_labels, [
      { label: 'Basic', data: r.basic_monthly, borderColor: '#f59e0b', tension: .4, pointRadius: 2 },
      { label: 'Premium', data: r.premium_monthly, borderColor: '#a78bfa', tension: .4, pointRadius: 2 }
    ], { plugins: { legend: { display: true, labels: { color: '#888', font: { size: 11 } } } } });
  }

  if (tab === 'buddy') {
    const b = data.buddy;
    makeChart('chart-buddy-sessions', 'line', b.days_labels,
      [{ data: b.sessions_daily, borderColor: '#4f8ef7', backgroundColor: 'rgba(79,142,247,.1)',
         fill: true, tension: .4, pointRadius: 2 }]);
  }

  if (tab === 'bloggers') {
    const b = data.bloggers;
    makeChart('chart-blogger-revenue', 'bar',
      (b.months || []).map(m => m.label),
      [{ data: (b.months || []).map(m => m.total_commission),
         backgroundColor: 'rgba(62,207,142,.7)', borderRadius: 4 }]);
  }
}

// ── BLOGGERS ─────────────────────────────────────────────
function renderBloggers() {
  const d = data.bloggers;
  const months = d.months || [];

  // Місяць-селектор
  const monthOpts = months.map((m, i) =>
    `<option value="${i}" ${i === months.length-1 ? 'selected' : ''}>${m.label}</option>`
  ).join('');

  return `
  <div class="cards">
    <div class="card accent">
      <div class="card-label">Активних блогерів</div>
      <div class="card-value" style="color:var(--accent)">${fmt(d.total_bloggers)}</div>
    </div>
    <div class="card green">
      <div class="card-label">Всього виплат</div>
      <div class="card-value" style="color:var(--green)">$${fmt(d.total_paid_out)}</div>
    </div>
    <div class="card amber">
      <div class="card-label">Нараховано цього міс.</div>
      <div class="card-value" style="color:var(--amber)">$${fmt(d.pending_this_month)}</div>
      <div class="card-delta delta-flat">ще не виплачено</div>
    </div>
    <div class="card purple">
      <div class="card-label">Всього студентів від блогерів</div>
      <div class="card-value" style="color:var(--purple)">${fmt(d.total_referred)}</div>
    </div>
  </div>

  <div class="chart-block">
    <div class="chart-title">Нарахування блогерам по місяцях ($)</div>
    <div class="chart-wrap"><canvas id="chart-blogger-revenue"></canvas></div>
  </div>

  <div class="table-block">
    <div class="table-title">Звіт по блогерах (поточний місяць)</div>
    <table>
      <tr>
        <th>Блогер</th><th>Студентів</th><th>Basic</th><th>Premium</th>
        <th>В тріалі</th><th>Активних</th><th>Нараховано</th>
      </tr>
      ${(d.blogger_stats || []).map(b => `
        <tr>
          <td style="font-weight:600">${b.name}</td>
          <td>${fmt(b.total)}</td>
          <td>${fmt(b.basic)}</td>
          <td>${fmt(b.premium)}</td>
          <td style="color:var(--amber)">${fmt(b.trial)}</td>
          <td style="color:var(--green)">${fmt(b.active)}</td>
          <td style="color:var(--green);font-weight:600">$${b.commission}</td>
        </tr>`).join('')}
    </table>
  </div>

  <div class="table-block">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div class="table-title" style="margin:0">Оплати від студентів блогерів</div>
      <select id="month-select" style="background:var(--surface2);border:1px solid var(--border);
        border-radius:6px;color:var(--text);font-size:12px;padding:4px 8px"
        onchange="filterPayouts(this.value)">
        ${monthOpts}
      </select>
    </div>
    <table id="payouts-table">
      <tr><th>Дата</th><th>Блогер</th><th>Студент</th><th>Тариф</th><th>Сума</th><th>Комісія</th><th>Статус</th></tr>
      ${renderPayoutsRows(months.length - 1, months)}
    </table>
  </div>

  <div class="table-block">
    <div class="table-title">Виплати блогерам (статус)</div>
    <table>
      <tr><th>Блогер</th><th>Місяць</th><th>Сума</th><th>Статус</th><th>Дата виплати</th></tr>
      ${(d.payouts_summary || []).map(p => `
        <tr>
          <td style="font-weight:600">${p.blogger}</td>
          <td>${p.month}</td>
          <td style="color:var(--green)">$${p.total_commission}</td>
          <td>
            <span style="padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;
              background:${p.paid ? 'rgba(62,207,142,.15)' : 'rgba(245,158,11,.15)'};
              color:${p.paid ? 'var(--green)' : 'var(--amber)'}">
              ${p.paid ? '✅ Виплачено' : '⏳ Очікує'}
            </span>
          </td>
          <td style="color:var(--text2)">${p.paid_date || '—'}</td>
        </tr>`).join('')}
    </table>
  </div>`;
}

function renderPayoutsRows(monthIdx, months) {
  if (!months || !months[monthIdx]) return '<tr><td colspan="7" style="color:var(--text3);text-align:center">Немає даних</td></tr>';
  const rows = months[monthIdx].payouts || [];
  if (!rows.length) return '<tr><td colspan="7" style="color:var(--text3);text-align:center">Немає оплат за цей місяць</td></tr>';
  return rows.map(p => `
    <tr>
      <td style="color:var(--text2)">${p.date || '—'}</td>
      <td style="font-weight:600">${p.blogger}</td>
      <td>${p.student_name}</td>
      <td><span style="padding:2px 7px;border-radius:10px;font-size:11px;
        background:${p.plan==='premium' ? 'rgba(167,139,250,.15)' : 'rgba(79,142,247,.15)'};
        color:${p.plan==='premium' ? 'var(--purple)' : 'var(--accent)'}">
        ${p.plan}
      </span></td>
      <td>$${p.amount}</td>
      <td style="color:var(--green)">$${p.commission}</td>
      <td><span style="padding:2px 7px;border-radius:10px;font-size:11px;
        background:${p.paid ? 'rgba(62,207,142,.15)' : 'rgba(245,158,11,.15)'};
        color:${p.paid ? 'var(--green)' : 'var(--amber)'}">
        ${p.paid ? '✅' : '⏳'}
      </span></td>
    </tr>`).join('');
}

function filterPayouts(monthIdx) {
  const months = data.bloggers.months || [];
  document.getElementById('payouts-table').innerHTML =
    '<tr><th>Дата</th><th>Блогер</th><th>Студент</th><th>Тариф</th><th>Сума</th><th>Комісія</th><th>Статус</th></tr>' +
    renderPayoutsRows(parseInt(monthIdx), months);
}

// ── HELPERS ──────────────────────────────────────────────
function fmt(n) {
  if (n == null) return '—';
  if (n >= 1000) return (n/1000).toFixed(1) + 'K';
  return String(n);
}
function pct(a, b) {
  if (!b) return '0%';
  return Math.round((a / b) * 100) + '%';
}

loadData();
</script>
