<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="/static/tokens.css">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>SpeakChain Player</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body {
      background:var(--bg); min-height:100vh;
      display:flex; flex-direction:column;
      font-family:-apple-system,BlinkMacSystemFont,sans-serif;
      color:var(--text);
      padding-bottom:max(env(safe-area-inset-bottom),12px);
      overflow-x:hidden;
    }

    /* ── Video ── */
    #video-wrap { position:relative; width:100%; background:#000; aspect-ratio:16/9; }
    #yt-player  { width:100%; height:100%; }
    #yt-player iframe { width:100%!important; height:100%!important; border:none; }
    #play-overlay {
      position:absolute; inset:0;
      display:flex; align-items:center; justify-content:center;
      background:rgba(0,0,0,0.45); cursor:pointer; z-index:10;
    }
    #play-overlay.hidden { display:none; }
    .play-circle {
      width:64px; height:64px; border-radius:50%;
      background:rgba(124,110,247,0.85);
      display:flex; align-items:center; justify-content:center;
      font-size:var(--fs-xl); padding-left:4px;
      box-shadow:0 0 32px rgba(124,110,247,0.5);
    }
    #video-fallback {
      display:none; width:100%; aspect-ratio:16/9; background:#000;
      align-items:center; justify-content:center;
      flex-direction:column; gap:14px; text-align:center; padding:20px;
    }
    #video-fallback.show { display:flex; }
    .open-yt-btn {
      padding:12px 24px; border-radius:var(--r-lg); border:none;
      background:var(--red); color:#fff;
      font-size:var(--fs); font-weight:700; cursor:pointer; text-decoration:none;
    }

    /* ── Subtitle overlay ── */
    #transcript-overlay {
      position:absolute; bottom:0; left:0; right:0;
      padding:8px 12px 10px;
      background:linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.4) 70%, transparent 100%);
      display:flex; align-items:flex-end; justify-content:center;
      z-index:20; pointer-events:none;
      min-height:48px;
      opacity:0; transition:opacity 0.3s;
    }
    #transcript-overlay.show { opacity:1; }
    #transcript-text {
      font-size:var(--fs); font-weight:600; color:#fff; text-align:center; line-height:1.5;
      text-shadow:0 1px 6px rgba(0,0,0,0.9); transition:opacity 0.2s; max-width:100%;
    }
    /* fade керується через style.opacity в syncCaptions */

    /* ── Session bar ── */
    #session-bar {
      background:var(--bg-card); padding:8px 16px;
      display:flex; align-items:center; justify-content:space-between;
      border-bottom:0.5px solid var(--line);
    }
    .session-time-wrap { display:flex; align-items:center; gap:8px; }
    #session-time { font-size:var(--fs); font-weight:700; color:var(--green); }
    #session-timer-label { font-size:var(--fs-xs); color:var(--text2); font-weight:600; }
    #finish-btn {
      padding:6px 14px; border-radius:var(--r-lg); border:none;
      background:linear-gradient(135deg,var(--purple),var(--purple));
      color:#fff; font-size:var(--fs-sm); font-weight:700; cursor:pointer;
    }

    /* ── Inactivity warning ── */
    #inactivity-warn {
      display:none; background:rgba(247,163,92,0.15);
      border:1px solid var(--orange); border-radius:var(--r);
      padding:10px 14px; margin:0 16px;
      font-size:var(--fs); color:var(--orange); text-align:center;
    }
    #inactivity-warn.show { display:block; }

    /* ── Journey strip ── */
    .journey-strip {
      padding:10px 16px 8px; background:var(--bg-card);
      border-bottom:0.5px solid var(--line);
    }
    .journey-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
    .journey-level { font-size:var(--fs-sm); font-weight:700; color:var(--purple); }
    .journey-goal  { font-size:var(--fs-xs); color:var(--orange); font-weight:600; }
    .journey-track {
      position:relative; height:7px;
      background:rgba(255,255,255,0.07); border-radius:var(--r-sm); overflow:visible; margin-bottom:6px;
    }
    .journey-fill {
      height:100%; border-radius:var(--r-sm);
      background:linear-gradient(90deg,var(--green),var(--purple));
      position:relative; transition:width 0.8s cubic-bezier(.4,0,.2,1);
    }
    .journey-thumb {
      position:absolute; right:-7px; top:50%; transform:translateY(-50%);
      width:16px; height:16px; border-radius:50%; background:#fff;
      border:2.5px solid var(--purple); box-shadow:0 0 8px rgba(124,110,247,0.7);
    }
    .journey-c2 { position:absolute; right:0; top:50%; transform:translateY(-50%); font-size:var(--fs); }
    .journey-marks { display:flex; justify-content:space-between; }
    .journey-mark { font-size:var(--fs-xs); font-weight:700; color:var(--text2); }
    .journey-mark.done    { color:var(--green); }
    .journey-mark.current { color:var(--purple); }
    .journey-mark.goal    { color:var(--orange); }

    /* ── Panel ── */
    .shadow-panel {
      background:var(--bg-card); border-top:0.5px solid var(--line);
      padding:14px 16px; display:flex; flex-direction:column; gap:14px;
    }
    .panel-label {
      font-size:var(--fs-xs); font-weight:700; letter-spacing:0.08em;
      color:var(--text2); text-transform:uppercase; margin-bottom:8px;
    }
    .divider { height:0.5px; background:var(--line); margin:0 -16px; }

    /* ── Loop status row ── */
    .loop-status {
      display:none; align-items:center; gap:8px; margin-top:8px;
    }
    .loop-status.show { display:flex; }
    .loop-timer-badge {
      font-size:var(--fs-sm); font-weight:700; color:var(--green);
      background:rgba(90,216,166,0.15); border-radius:var(--r-lg);
      padding:4px 10px; animation:pulse-green 1.5s infinite;
    }
    @keyframes pulse-green {
      0%,100%{ box-shadow:0 0 0 0 rgba(90,216,166,0.4); }
      50%    { box-shadow:0 0 0 6px rgba(90,216,166,0); }
    }
    .save-loop-inline {
      padding:6px 12px; border-radius:var(--r-lg); border:none;
      background:linear-gradient(135deg,var(--green),var(--green));
      color:var(--green-bg); font-size:var(--fs-sm); font-weight:700; cursor:pointer;
    }

    /* ── Loop / Повтор ── */
    .loop-row { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
    .loop-time {
      font-size:var(--fs-xs); color:var(--green); font-weight:600;
      background:rgba(90,216,166,0.1); border-radius:var(--r-sm); padding:4px 8px; min-width:44px; text-align:center;
    }
    .loop-time.empty { color:var(--text2); background:var(--bg-card2); }
    .icon-btn {
      padding:7px 12px; border-radius:var(--r-lg); border:1.5px solid var(--line);
      background:var(--bg-card2); color:var(--text); font-size:var(--fs-sm); font-weight:600; cursor:pointer;
    }
    .icon-btn.loop-active { border-color:var(--green); color:var(--green); background:rgba(90,216,166,0.12); }
    .icon-btn.danger { color:var(--red); border-color:rgba(247,110,110,0.3); }

    /* ── Record ── */
    .record-btn {
      width:100%; padding:14px; border-radius:var(--r); border:none;
      font-size:var(--fs); font-weight:700; cursor:pointer;
      display:flex; align-items:center; justify-content:center; gap:8px;
      transition:all 0.2s; -webkit-appearance:none;
    }
    .record-btn.idle {
      background:linear-gradient(135deg,var(--purple),var(--purple));
      color:#fff; box-shadow:0 4px 16px rgba(124,110,247,0.35);
    }
    .record-btn.recording {
      background:linear-gradient(135deg,var(--red),var(--orange));
      color:#fff; animation:pulse 1.2s infinite;
    }
    .record-btn.has-audio {
      background:var(--bg-card2); color:var(--text2); border:1.5px solid var(--line);
    }
    @keyframes pulse {
      0%,100% { box-shadow:0 4px 16px rgba(247,110,110,0.35); }
      50%      { box-shadow:0 4px 28px rgba(247,110,110,0.6); }
    }
    .rec-timer { text-align:center; font-size:var(--fs-sm); color:var(--red); font-weight:600; display:none; }
    .rec-timer.visible { display:block; }
    .mic-error { font-size:var(--fs-sm); color:var(--orange); text-align:center; display:none; }
    .mic-error.visible { display:block; }

    /* ── Waveform ── */
    #waveform-wrap {
      display:none; width:100%; height:56px;
      background:var(--bg-card2); border-radius:var(--r); overflow:hidden; position:relative;
    }
    #waveform-wrap.visible { display:block; }
    #waveform { width:100%; height:100%; display:block; }
    .rec-pulse { position:absolute; top:8px; left:10px; width:8px; height:8px; border-radius:50%; background:var(--red); animation:blink 1s infinite; }
    .rec-time  { position:absolute; top:5px; right:10px; font-size:var(--fs-xs); color:var(--text2); font-weight:600; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    /* ── Action buttons (after recording) ── */
    .action-row { display:flex; gap:8px; }
    .action-btn {
      flex:1; padding:10px; border-radius:var(--r);
      border:1.5px solid var(--line); background:var(--bg-card2);
      color:var(--text); font-size:var(--fs); font-weight:600; cursor:pointer;
      display:flex; align-items:center; justify-content:center; gap:5px;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .action-btn:disabled { opacity:0.35; cursor:not-allowed; }
    /* ── стани кнопки прослуховування ── */
    .action-btn.playing  {
      border-color:var(--orange); color:var(--orange);
      background:rgba(247,163,92,0.1);
    }
    .action-btn.paused {
      border-color:var(--green); color:var(--green);
      background:rgba(90,216,166,0.1);
    }

    .record-again-btn {
      width:100%; padding:9px; border-radius:var(--r);
      border:1.5px solid var(--line); background:var(--bg-card2);
      color:var(--text2); font-size:var(--fs); font-weight:600; cursor:pointer;
      display:none;
    }
    .record-again-btn.show { display:block; }

    /* ── Playback progress bar ── */
    #playback-bar-wrap {
      display:none; flex-direction:column; gap:4px;
    }
    #playback-bar-wrap.show { display:flex; }
    #playback-bar {
      width:100%; height:4px; background:var(--bg-card2);
      border-radius:var(--r-sm); overflow:hidden; cursor:pointer;
    }
    #playback-fill {
      height:100%; width:0%;
      background:linear-gradient(90deg,var(--orange),var(--yellow));
      border-radius:var(--r-sm); transition:width 0.1s linear;
    }
    .playback-times {
      display:flex; justify-content:space-between;
      font-size:var(--fs-xs); color:var(--text2); font-weight:600;
    }

    /* ── Save loop button ── */
    .save-loop-btn {
      width:100%; padding:10px; border-radius:var(--r); border:none;
      background:linear-gradient(135deg,var(--green),var(--green));
      color:var(--green-bg); font-size:var(--fs); font-weight:700; cursor:pointer;
      margin-top:8px; display:none;
    }
    .save-loop-btn.show { display:block; }

    /* ── Toast ── */
    .toast {
      position:fixed; bottom:28px; left:50%;
      transform:translateX(-50%) translateY(20px);
      background:var(--bg-card2); border:1px solid var(--line);
      color:var(--text); font-size:var(--fs); font-weight:600;
      padding:10px 20px; border-radius:var(--r-lg);
      opacity:0; transition:all 0.25s; pointer-events:none;
      box-shadow:0 4px 24px rgba(0,0,0,0.4); white-space:nowrap; z-index:100;
    }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<!-- Video -->
<div id="video-wrap">
  <div id="yt-player"></div>
  <div id="play-overlay"><div class="play-circle">▶</div></div>
  <div id="transcript-overlay"><div id="transcript-text"></div></div>
  <div id="video-fallback">
    <div style="color:var(--text2);font-size:var(--fs)">YouTube не завантажився</div>
    <a id="yt-link" class="open-yt-btn" target="_blank">▶ Відкрити на YouTube</a>
  </div>
</div>

<!-- Session bar -->
<div id="session-bar">
  <div class="session-time-wrap">
    <span id="session-timer-label">⏱ Сесія:</span>
    <span id="session-time">0:00</span>
  </div>
  <button id="finish-btn">✅ Завершити сесію</button>
</div>

<!-- Inactivity warning -->
<div id="inactivity-warn">
  ⚠️ Ти не активний вже 2 хвилини. Сесія закриється через <span id="warn-countdown">60</span> сек.
  <br><button onclick="resetInactivity()" style="margin-top:6px;padding:4px 12px;border-radius:var(--r);border:none;background:var(--orange);color:#fff;font-size:var(--fs-sm);cursor:pointer">Продовжити</button>
</div>

<!-- Journey strip -->
<div class="journey-strip" id="journey-strip" style="display:none">
  <div class="journey-top">
    <span class="journey-level" id="j-level">A1</span>
    <span class="journey-goal">Ціль: C2 👑</span>
  </div>
  <div class="journey-track">
    <div class="journey-fill" id="j-fill" style="width:0%"><div class="journey-thumb"></div></div>
    <span class="journey-c2">👑</span>
  </div>
  <div class="journey-marks" id="j-marks"></div>
</div>

<!-- Shadowing panel -->
<div class="shadow-panel">

  <!-- Повтор фрази -->
  <div>
    <div class="panel-label">Повтор фрази</div>
    <div class="loop-row">
      <button class="icon-btn" id="btn-start">⏮ Початок</button>
      <span class="loop-time empty" id="disp-start">--:--</span>
      <button class="icon-btn" id="btn-end">⏭ Кінець</button>
      <span class="loop-time empty" id="disp-end">--:--</span>
      <button class="icon-btn" id="btn-loop">🔁 Повтор</button>
      <button class="icon-btn danger" id="btn-clear">✕</button>
    </div>
    <div class="loop-status" id="loop-status">
      <span class="loop-timer-badge">🔁 <span id="loop-secs">0:00</span></span>
      <button class="save-loop-inline" id="btn-save-loop">💎 Зберегти фразу</button>
    </div>
  </div>

  <div class="divider"></div>

  <!-- Record -->
  <div style="display:flex;flex-direction:column;gap:10px">
    <div class="panel-label">Shadowing — запиши себе</div>

    <button class="record-btn idle" id="record-btn">🎙 Почати запис</button>
    <div class="rec-timer" id="rec-timer">● REC <span id="rec-secs">0:00</span></div>

    <!-- Waveform -->
    <div id="waveform-wrap">
      <canvas id="waveform"></canvas>
      <div class="rec-pulse"></div>
      <div class="rec-time" id="rec-time-label">0:00</div>
    </div>

    <div class="mic-error" id="mic-error"></div>

    <!-- Прослухати з паузою -->
    <div class="action-row">
      <button class="action-btn" id="play-my" disabled>▶ Прослухати</button>
    </div>

    <!-- Прогрес-бар відтворення -->
    <div id="playback-bar-wrap">
      <div id="playback-bar"><div id="playback-fill"></div></div>
      <div class="playback-times">
        <span id="pb-current">0:00</span>
        <span id="pb-total">0:00</span>
      </div>
    </div>

    <!-- Записати ще / Зберегти фразу -->
    <button class="record-again-btn" id="record-again-btn">💎 Зберегти фразу</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
/* canvas не розуміє var() — читаємо реальний колір із tokens.css */
const _cssVarCache={};
function cssVar(name){
  if(!_cssVarCache[name]){
    _cssVarCache[name]=getComputedStyle(document.documentElement)
      .getPropertyValue(name).trim() || '#7c6ef7';
  }
  return _cssVarCache[name];
}

// ── Telegram guard ──
const TG = (typeof Telegram !== 'undefined' && Telegram.WebApp) ? Telegram.WebApp : null;
if (TG) { try { TG.ready(); TG.expand(); } catch(e){} }

const params     = new URLSearchParams(window.location.search);
const startParam = TG?.initDataUnsafe?.start_param || "";
let videoId      = params.get("v") || null;
let videoTitle   = "";   // назва відео з YouTube
let refCode      = null;
const dataRaw    = params.get("d");

if (!videoId && startParam) {
  if (startParam.startsWith("ref_") && startParam.length >= 15) {
    videoId = startParam.slice(-11);
    refCode = startParam;
  } else {
    videoId = startParam;
  }
}

let apiBase = "";
let captionsUrl = "";
let playerUid = 0;
if (dataRaw) {
  try {
    const _d = JSON.parse(decodeURIComponent(dataRaw));
    apiBase     = _d.api          || "";
    captionsUrl = _d.captions_url || "";
    playerUid   = _d.uid          || 0;
  } catch(e) {}
}

// ── Register referral ──
if (refCode && apiBase) {
  const uid = TG?.initDataUnsafe?.user?.id;
  if (uid) {
    fetch(`${apiBase}/register_ref`, {
      method: "POST", headers: {"Content-Type":"application/json"},
      body: JSON.stringify({uid, ref_code: refCode})
    }).catch(()=>{});
  }
}

// ── Toast ──
function showToast(msg, dur=2200) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), dur);
}

// ── Session timer ──
const sessionStart = Date.now();
let sessionSec = 0;
const sessionInterval = setInterval(()=>{
  sessionSec++;
  const m = Math.floor(sessionSec/60), s = sessionSec%60;
  document.getElementById("session-time").textContent = m+":"+String(s).padStart(2,"0");
}, 1000);

document.getElementById("finish-btn").addEventListener("click", finishSession);

async function finishSession() {
  clearInterval(sessionInterval);
  clearInactivityTimers();
  const minutes = Math.max(1, Math.round(sessionSec/60));
  // Додаємо тільки приріст цієї сесії (не весь накопичений час)
  const totalSec = sessionSec + sessionPlaybackSec;
  const totalMinutes = Math.max(1, Math.round(totalSec/60));
  const uid = TG?.initDataUnsafe?.user?.id || playerUid;
  if (uid && apiBase) {
    try {
      await fetch(`${apiBase}/session`, {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          uid,
          minutes:           totalMinutes,      // відео + прослуховування (XP)
          video_minutes:     minutes,            // тільки відео
          playback_sec:      sessionPlaybackSec, // приріст цієї сесії
          playback_total_sec: playbackTotalSec,  // накопичений загальний
          video_id:          videoId||"",
          video_title:       videoTitle||"",
          video_url:         videoId ? `https://youtu.be/${videoId}` : ""
        })
      });
    } catch(e){}
  }
  TG ? TG.close() : window.close();
}

// ── Inactivity ──
const INACTIVITY_LIMIT = 3*60*1000;
const INACTIVITY_WARN  = 2*60*1000;
let inactivityTimer=null, warnTimer=null, warnCountdown=null, warnSec=60;

function resetInactivity() {
  clearInactivityTimers();
  document.getElementById("inactivity-warn").classList.remove("show");
  warnTimer       = setTimeout(showInactivityWarn, INACTIVITY_WARN);
  inactivityTimer = setTimeout(()=>finishSession(), INACTIVITY_LIMIT);
}
function clearInactivityTimers() {
  clearTimeout(inactivityTimer); clearTimeout(warnTimer); clearInterval(warnCountdown);
}
function showInactivityWarn() {
  document.getElementById("inactivity-warn").classList.add("show");
  warnSec = 60;
  document.getElementById("warn-countdown").textContent = warnSec;
  warnCountdown = setInterval(()=>{
    warnSec--;
    document.getElementById("warn-countdown").textContent = warnSec;
    if (warnSec<=0){ clearInterval(warnCountdown); finishSession(); }
  },1000);
}
["touchstart","click","keydown","scroll"].forEach(ev=>{
  document.addEventListener(ev, resetInactivity, {passive:true});
});
resetInactivity();

// ── YouTube Player ──
let ytPlayer=null, ytReady=false;
let loopStart=null, loopEnd=null, loopActive=false, loopTimer=null;
const apiTimeout = setTimeout(()=>{ if(!ytReady) showFallback(); }, 8000);

function showFallback() {
  document.getElementById("yt-player").style.display="none";
  document.getElementById("play-overlay").classList.add("hidden");
  document.getElementById("video-fallback").classList.add("show");
  if (videoId) document.getElementById("yt-link").href="https://youtu.be/"+videoId;
}

document.getElementById("play-overlay").addEventListener("click", function(){
  this.classList.add("hidden");
  if (ytPlayer && ytReady) {
    ytPlayer.playVideo();
    // iOS: завантажуємо субтитри при першому натисканні play
    if (captions.length === 0) setTimeout(loadCaptions, 1000);
  }
  resetInactivity();
});

if (!videoId) showFallback();

window.onYouTubeIframeAPIReady = function() {
  if (!videoId) return;
  clearTimeout(apiTimeout);
  try {
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
    ytPlayer = new YT.Player("yt-player", {
      height:"100%", width:"100%", videoId,
      playerVars: { autoplay:isIOS?0:1, rel:0, modestbranding:1, playsinline:1 },
      events: {
        onReady: function(e) {
          ytReady = true;
          // Зберігаємо назву відео
          try { videoTitle = e.target.getVideoData().title || ""; } catch(_){}
          if (!(/iPad|iPhone|iPod/.test(navigator.userAgent))) {
            document.getElementById("play-overlay").classList.add("hidden");
            e.target.playVideo();
          }
          // Завантажуємо субтитри після готовності плеєра
          setTimeout(loadCaptions, 800);
        },
        onStateChange: function(e) {
          if (e.data === YT.PlayerState.PLAYING) resetInactivity();
        },
        onError: function() { showFallback(); }
      }
    });
  } catch(e) { showFallback(); }
};
</script>
<script src="https://www.youtube.com/iframe_api" async></script>
<script>
function fmt(sec) {
  if (sec==null) return "--:--";
  return Math.floor(sec/60)+":"+String(Math.floor(sec%60)).padStart(2,"0");
}

// ── Loop / Повтор ──
let loopSecTimer=null, loopSec=0;

function startLoopTimer() {
  loopSec=0; clearInterval(loopSecTimer);
  loopSecTimer = setInterval(()=>{
    loopSec++;
    const m=Math.floor(loopSec/60), s=loopSec%60;
    document.getElementById("loop-secs").textContent=m+":"+String(s).padStart(2,"0");
  },1000);
  document.getElementById("loop-status").classList.add("show");
}
function stopLoopTimer() {
  clearInterval(loopSecTimer); loopSec=0;
  document.getElementById("loop-secs").textContent="0:00";
  document.getElementById("loop-status").classList.remove("show");
}

document.getElementById("btn-start").addEventListener("click",()=>{
  if (!ytPlayer||!ytReady){showToast("Відео ще завантажується…");return;}
  loopStart=ytPlayer.getCurrentTime();
  document.getElementById("disp-start").textContent=fmt(loopStart);
  document.getElementById("disp-start").classList.remove("empty");
  showToast("Початок: "+fmt(loopStart)); resetInactivity();
});
document.getElementById("btn-end").addEventListener("click",()=>{
  if (!ytPlayer||!ytReady){showToast("Відео ще завантажується…");return;}
  loopEnd=ytPlayer.getCurrentTime();
  document.getElementById("disp-end").textContent=fmt(loopEnd);
  document.getElementById("disp-end").classList.remove("empty");
  showToast("Кінець: "+fmt(loopEnd)); resetInactivity();
});
document.getElementById("btn-loop").addEventListener("click",()=>{
  if (loopStart==null||loopEnd==null||loopEnd<=loopStart){
    showToast("Встанови початок і кінець 👆"); return;
  }
  loopActive=!loopActive;
  const btn=document.getElementById("btn-loop");
  btn.classList.toggle("loop-active",loopActive);
  btn.textContent=loopActive?"⏹ Стоп":"🔁 Повтор";
  clearInterval(loopTimer);
  if (loopActive){
    ytPlayer.seekTo(loopStart,true); ytPlayer.playVideo();
    loopTimer=setInterval(()=>{
      if (!loopActive||!ytPlayer) return;
      if (ytPlayer.getCurrentTime()>=loopEnd) ytPlayer.seekTo(loopStart,true);
    },250);
    startLoopTimer();
  } else { stopLoopTimer(); }
  resetInactivity();
});
document.getElementById("btn-clear").addEventListener("click",()=>{
  loopStart=loopEnd=null; loopActive=false;
  clearInterval(loopTimer); stopLoopTimer();
  ["disp-start","disp-end"].forEach(id=>{
    document.getElementById(id).textContent="--:--";
    document.getElementById(id).classList.add("empty");
  });
  const lb=document.getElementById("btn-loop");
  lb.classList.remove("loop-active"); lb.textContent="🔁 Повтор";
  resetInactivity();
});

// ── Лічильник часу прослуховування свого запису (іде в XP) ──
// Накопичується по всіх сесіях у localStorage
const PB_STORAGE_KEY = videoId ? `pb_sec_${videoId}` : "pb_sec_global";

function pbLoad() {
  try { return parseInt(localStorage.getItem(PB_STORAGE_KEY) || "0", 10) || 0; }
  catch(e) { return 0; }
}
function pbSave(sec) {
  try { localStorage.setItem(PB_STORAGE_KEY, String(sec)); } catch(e) {}
}

let playbackTotalSec  = pbLoad();  // накопичений по всіх сесіях
let sessionPlaybackSec = 0;        // тільки поточна сесія (для XP)
let pbTickInterval    = null;

function startPlaybackTick() {
  clearInterval(pbTickInterval);
  pbTickInterval = setInterval(()=>{
    playbackTotalSec++;
    sessionPlaybackSec++;
    pbSave(playbackTotalSec);      // зберігаємо кожну секунду
  }, 1000);
}
function stopPlaybackTick() {
  clearInterval(pbTickInterval);
  pbSave(playbackTotalSec);        // зберігаємо при зупинці
}

// ── Recording ──
function getSupportedMime() {
  const list=["audio/webm;codecs=opus","audio/webm","audio/mp4;codecs=mp4a.40.2","audio/mp4","audio/ogg;codecs=opus",""];
  if (typeof MediaRecorder==="undefined") return null;
  for (const t of list) if (t===""||MediaRecorder.isTypeSupported(t)) return t;
  return "";
}

let mediaRecorder=null, audioChunks=[], audioURL=null, audioDuration=0;
let recSec=0, recInterval=null, isRec=false;
let audioCtx=null, analyser=null, animFrame=null;

const recordBtn    = document.getElementById("record-btn");
const waveWrap     = document.getElementById("waveform-wrap");
const canvas       = document.getElementById("waveform");
const recTimeLabel = document.getElementById("rec-time-label");
const micError     = document.getElementById("mic-error");
const playMyBtn    = document.getElementById("play-my");
const recAgainBtn  = document.getElementById("record-again-btn");
const pbWrap       = document.getElementById("playback-bar-wrap");
const pbFill       = document.getElementById("playback-fill");
const pbBar        = document.getElementById("playback-bar");
const pbCurrent    = document.getElementById("pb-current");
const pbTotal      = document.getElementById("pb-total");

function resizeCanvas() {
  const dpr=window.devicePixelRatio||1;
  canvas.width=canvas.offsetWidth*dpr; canvas.height=canvas.offsetHeight*dpr;
  canvas.getContext("2d").scale(dpr,dpr);
}

function drawWaveform() {
  if (!analyser||!isRec) return;
  animFrame=requestAnimationFrame(drawWaveform);
  const bufLen=analyser.frequencyBinCount, data=new Uint8Array(bufLen);
  analyser.getByteFrequencyData(data);
  const w=canvas.offsetWidth, h=canvas.offsetHeight;
  const ctx=canvas.getContext("2d");
  ctx.clearRect(0,0,w,h);
  const barW=w/bufLen*2.5, gap=1, count=Math.floor(w/(barW+gap)), step=Math.floor(bufLen/count);
  for (let i=0;i<count;i++){
    const val=data[i*step]/255, barH=Math.max(3,val*h*0.9), x=i*(barW+gap), y=(h-barH)/2;
    const grad=ctx.createLinearGradient(0,y+barH,0,y);
    grad.addColorStop(0,cssVar("--green")); grad.addColorStop(1,cssVar("--purple"));
    ctx.fillStyle=grad;
    ctx.beginPath(); ctx.roundRect(x,y,barW,barH,2); ctx.fill();
  }
}

recordBtn.addEventListener("click", async()=>{
  if (isRec){ stopRec(); return; }
  if (!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
    micError.textContent="Мікрофон недоступний."; micError.classList.add("visible"); return;
  }
  // Якщо є запис — скидаємо його перед новим
  if (audioURL) { resetPlayback(); }
  try {
    const stream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});
    const mime=getSupportedMime();
    micError.classList.remove("visible");
    audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    analyser=audioCtx.createAnalyser(); analyser.fftSize=128;
    audioCtx.createMediaStreamSource(stream).connect(analyser);
    try { mediaRecorder=mime?new MediaRecorder(stream,{mimeType:mime}):new MediaRecorder(stream); }
    catch(e){ mediaRecorder=new MediaRecorder(stream); }
    audioChunks=[];
    mediaRecorder.addEventListener("dataavailable",e=>{if(e.data&&e.data.size>0)audioChunks.push(e.data);});
    mediaRecorder.addEventListener("stop",()=>{
      stream.getTracks().forEach(t=>t.stop());
      const blob=new Blob(audioChunks,{type:mediaRecorder.mimeType||"audio/webm"});
      audioURL=URL.createObjectURL(blob);
      cancelAnimationFrame(animFrame);
      waveWrap.classList.remove("visible");
      recordBtn.className="record-btn has-audio";
      recordBtn.textContent="🎙 Записати ще раз";
      playMyBtn.disabled=false;
      recAgainBtn.classList.add("show");
      // Показуємо прогрес-бар
      pbWrap.classList.add("show");
      pbFill.style.width="0%";
      pbCurrent.textContent="0:00";
      pbTotal.textContent=fmt(recSec);
      audioDuration=recSec;
      showToast("✅ Запис готовий!");
      resetInactivity();
    });
    mediaRecorder.start(100); isRec=true; recSec=0;
    recTimeLabel.textContent="0:00";
    waveWrap.classList.add("visible");
    setTimeout(resizeCanvas,10);
    drawWaveform();
    recordBtn.className="record-btn recording";
    recordBtn.textContent="⏹ Зупинити";
    if (loopActive&&ytPlayer&&ytReady) ytPlayer.seekTo(loopStart,true);
    resetInactivity();
    recInterval=setInterval(()=>{
      recSec++;
      recTimeLabel.textContent=Math.floor(recSec/60)+":"+String(recSec%60).padStart(2,"0");
      if (recSec>=120) stopRec();
    },1000);
  } catch(err){
    let msg="Дозволь доступ до мікрофону 🎙";
    if (err.name==="NotFoundError")   msg="Мікрофон не знайдено";
    if (err.name==="NotAllowedError") msg="Доступ до мікрофону заблоковано";
    micError.textContent=msg; micError.classList.add("visible");
    showToast(msg,3000);
  }
});

function stopRec() {
  if (!mediaRecorder||!isRec) return;
  isRec=false; clearInterval(recInterval);
  if (mediaRecorder.state==="recording"){ mediaRecorder.requestData(); setTimeout(()=>mediaRecorder.stop(),80); }
}

// ── Playback з паузою / продовженням ──
let myAudio=null, pbInterval=null;
// стани: 'idle' | 'playing' | 'paused'
let pbState='idle';

function resetPlayback() {
  if (myAudio){ myAudio.pause(); myAudio.src=""; myAudio=null; }
  clearInterval(pbInterval);
  pbState='idle';
  pbFill.style.width="0%";
  pbCurrent.textContent="0:00";
  playMyBtn.className="action-btn";
  playMyBtn.textContent="▶ Прослухати";
  playMyBtn.disabled=!audioURL;
}

function startPbProgress() {
  clearInterval(pbInterval);
  pbInterval=setInterval(()=>{
    if (!myAudio||myAudio.paused) return;
    const cur=myAudio.currentTime, dur=myAudio.duration||audioDuration||1;
    const pct=Math.min(100, cur/dur*100);
    pbFill.style.width=pct+"%";
    pbCurrent.textContent=fmt(cur);
  },100);
}

playMyBtn.addEventListener("click",()=>{
  if (!audioURL) return;

  // ── Якщо ще немає об'єкта або він закінчив грати ──
  if (!myAudio || myAudio.ended) {
    if (myAudio){ myAudio.src=""; myAudio=null; }
    myAudio=new Audio(audioURL);
    myAudio.onended=()=>{
      pbState='idle';
      stopPlaybackTick();          // зупиняємо лічильник
      playMyBtn.className="action-btn";
      playMyBtn.textContent="▶ Прослухати";
      pbFill.style.width="100%";
      clearInterval(pbInterval);
    };
    myAudio.play().then(()=>{
      pbState='playing';
      playMyBtn.className="action-btn playing";
      playMyBtn.textContent="⏸ Пауза";
      startPbProgress();
      startPlaybackTick();         // рахуємо час слухання
    }).catch(()=>showToast("Натисни ще раз"));
    resetInactivity();
    return;
  }

  // ── Пауза ──
  if (pbState==='playing') {
    myAudio.pause();
    pbState='paused';
    clearInterval(pbInterval);
    stopPlaybackTick();            // зупиняємо лічильник
    playMyBtn.className="action-btn paused";
    playMyBtn.textContent="▶ Продовжити";
    resetInactivity();
    return;
  }

  // ── Продовжити ──
  if (pbState==='paused') {
    myAudio.play().then(()=>{
      pbState='playing';
      playMyBtn.className="action-btn playing";
      playMyBtn.textContent="⏸ Пауза";
      startPbProgress();
      startPlaybackTick();         // продовжуємо лічильник
    }).catch(()=>showToast("Натисни ще раз"));
    resetInactivity();
    return;
  }
});

// Клік по прогрес-бару — перемотка
pbBar.addEventListener("click",(e)=>{
  if (!myAudio||!audioURL) return;
  const rect=pbBar.getBoundingClientRect();
  const pct=(e.clientX-rect.left)/rect.width;
  const dur=myAudio.duration||audioDuration||1;
  myAudio.currentTime=pct*dur;
  pbFill.style.width=(pct*100)+"%";
  pbCurrent.textContent=fmt(myAudio.currentTime);
  resetInactivity();
});

// Кнопка "Зберегти фразу"
recAgainBtn.addEventListener("click", saveLoopPhrase);

async function saveLoopPhrase() {
  const uid=TG?.initDataUnsafe?.user?.id;
  if (!uid||!apiBase){ showToast("Помилка: немає з'єднання"); return; }
  const captionEl=document.getElementById("transcript-text");
  const phrase=(captionEl&&captionEl.textContent.trim())
    ? captionEl.textContent.trim()
    : (loopStart!=null&&loopEnd!=null ? `[${fmt(loopStart)} – ${fmt(loopEnd)}]` : "saved phrase");
  try {
    await fetch(`${apiBase}/player_action`,{
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({uid,action:"save_phrase",phrase})
    });
    showToast("💎 Фразу збережено!");
    recAgainBtn.textContent="✅ Збережено";
    setTimeout(()=>{ recAgainBtn.textContent="💎 Зберегти фразу"; },2000);
  } catch(e){ showToast("Помилка збереження"); }
  resetInactivity();
}

const btnSaveLoop=document.getElementById("btn-save-loop");
btnSaveLoop.addEventListener("click", saveLoopPhrase);

// ── Subtitles ──
let captions=[];
async function loadCaptions(){
  // Використовуємо явний captions_url якщо переданий, інакше будуємо з apiBase
  const capBase = captionsUrl || (apiBase ? apiBase + "/captions" : "");
  if (!videoId || !capBase) return;
  try {
    const res=await fetch(`${capBase}?v=${videoId}&lang=en`,{signal:AbortSignal.timeout(6000)});
    if (!res.ok) return;
    const data=await res.json();
    if (!data.events) return;
    captions=data.events
      .filter(e=>e.segs&&e.tStartMs!=null)
      .map(e=>({start:e.tStartMs/1000,end:(e.tStartMs+(e.dDurationMs||2000))/1000,
                 text:e.segs.map(s=>s.utf8||"").join("").replace(/\n/g," ").trim()}))
      .filter(e=>e.text.length>0);
    if (captions.length>0){
      document.getElementById("transcript-overlay").classList.add("show");
      setInterval(syncCaptions,150); // 150ms для плавніших субтитрів
    }
  } catch(e){}
}

function syncCaptions(){
  if (!ytPlayer||!ytReady) return;
  let cur;
  try { cur=ytPlayer.getCurrentTime(); } catch(_){ return; }
  const el=document.getElementById("transcript-text");
  const overlay=document.getElementById("transcript-overlay");
  // Розширений буфер пошуку — 0.5сек до і після
  let found=captions.find(c=>cur>=c.start-0.1&&cur<=c.end+0.5);
  if (found){
    overlay.classList.add("show");
    if (el.textContent!==found.text){
      el.style.opacity="0";
      setTimeout(()=>{ el.textContent=found.text; el.style.opacity="1"; },120);
    } else {
      el.style.opacity="1";
    }
  } else {
    el.style.opacity="0.3";
  }
}

// ── Journey strip ──
if (dataRaw){
  try {
    const D = JSON.parse(decodeURIComponent(dataRaw));
    const levels  = D.levels  || ["A1","A2","B1","B2","C1","C2"];
    const grammar = D.cefr_grammar || {};
    const mastered  = D.mastered || [];
    const curLevel  = D.level   || "A1";
    const xp        = D.xp_total || 0;
    const streak    = D.streak_days || 0;
    const playerMin = D.player_minutes_total || 0;
    const name      = D.name || "";

    // Рахуємо загальний прогрес A1→C2
    const allTopics  = levels.flatMap(l => grammar[l] || []);
    const totalCount = allTopics.length;
    const doneCount  = mastered.length;
    const pct = totalCount ? Math.round(doneCount / totalCount * 100) : 0;

    // Показуємо смужку
    document.getElementById("journey-strip").style.display = "block";
    document.getElementById("j-level").textContent = curLevel;
    document.getElementById("j-fill").style.width  = pct + "%";

    // Мітки рівнів
    const marksEl = document.getElementById("j-marks");
    levels.forEach(lvl => {
      const topics = grammar[lvl] || [];
      const done   = topics.filter(t => mastered.includes(t)).length;
      const isAll  = done === topics.length && topics.length > 0;
      const isCur  = lvl === curLevel && !isAll;
      const el = document.createElement("span");
      el.className = "journey-mark" + (isAll?" done":"") + (isCur?" current":"") + (lvl==="C2"&&!isAll?" goal":"");
      el.textContent = isAll ? lvl+"✓" : lvl;
      marksEl.appendChild(el);
    });

    // Статус-рядок під смужкою
    const hours = Math.floor(playerMin / 60);
    const mins  = playerMin % 60;
    const timeStr = hours > 0 ? `${hours} год ${mins} хв` : `${mins} хв`;
    const statsEl = document.createElement("div");
    statsEl.style.cssText = "display:flex;gap:12px;margin-top:6px;flex-wrap:wrap;";
    const items = [
      { icon:"📚", val: doneCount + "/" + totalCount, label:"тем" },
      { icon:"⚡️", val: xp,       label:"XP"        },
      { icon:"🔥", val: streak,    label:"дн."       },
      { icon:"⏱",  val: timeStr,   label:""          },
    ];
    items.forEach(it => {
      const sp = document.createElement("span");
      sp.style.cssText = "font-size:var(--fs-xs);color:var(--text2);font-weight:600;";
      sp.textContent = `${it.icon} ${it.val}${it.label?" "+it.label:""}`;
      statsEl.appendChild(sp);
    });
    document.getElementById("journey-strip").appendChild(statsEl);

  } catch(e){}
}

// Субтитри завантажуємо після того як ytPlayer готовий
// (викликається з onReady callback через невелику затримку)
</script>
