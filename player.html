<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>SpeakChain Player</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --purple: #7c6ef7;
      --green:  #5ad8a6;
      --orange: #f7a35c;
      --red:    #f76e6e;
      --bg:     #0d0d14;
      --bg2:    #16161f;
      --bg3:    #1e1e2e;
      --text:   #e8e8f0;
      --text2:  #8888a8;
      --border: rgba(255,255,255,0.07);
    }
    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text);
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* ── Video ── */
    #player-wrap { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; }
    #player-wrap iframe { width: 100%; height: 100%; border: none; display: block; }

    /* ── Journey strip ── */
    .journey-strip {
      padding: 10px 16px 8px;
      background: var(--bg2);
      border-bottom: 0.5px solid var(--border);
    }
    .journey-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .journey-level { font-size: 12px; font-weight: 700; color: var(--purple); }
    .journey-goal  { font-size: 11px; color: var(--orange); font-weight: 600; }
    .journey-track {
      position: relative; height: 7px;
      background: rgba(255,255,255,0.07); border-radius: 8px; overflow: visible; margin-bottom: 6px;
    }
    .journey-fill {
      height: 100%; border-radius: 8px;
      background: linear-gradient(90deg, #5ad8a6, #7c6ef7);
      position: relative; transition: width 0.8s cubic-bezier(.4,0,.2,1);
    }
    .journey-thumb {
      position: absolute; right: -7px; top: 50%; transform: translateY(-50%);
      width: 16px; height: 16px; border-radius: 50%; background: #fff;
      border: 2.5px solid var(--purple); box-shadow: 0 0 8px rgba(124,110,247,0.7);
    }
    .journey-c2 { position: absolute; right: 0; top: 50%; transform: translateY(-50%); font-size: 14px; }
    .journey-marks { display: flex; justify-content: space-between; padding: 0 1px; }
    .journey-mark { font-size: 9px; font-weight: 700; color: var(--text2); }
    .journey-mark.done    { color: var(--green); }
    .journey-mark.current { color: var(--purple); }
    .journey-mark.goal    { color: var(--orange); }

    /* ── Shadowing Panel ── */
    .shadow-panel {
      background: var(--bg2);
      border-top: 0.5px solid var(--border);
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .panel-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
      color: var(--text2); text-transform: uppercase;
    }

    /* Speed control */
    .speed-row { display: flex; align-items: center; gap: 8px; }
    .speed-label { font-size: 12px; color: var(--text2); min-width: 48px; }
    .speed-btns  { display: flex; gap: 6px; }
    .speed-btn {
      padding: 5px 10px; border-radius: 20px; border: 1.5px solid var(--border);
      background: var(--bg3); color: var(--text2);
      font-size: 12px; font-weight: 600; cursor: pointer;
      transition: all 0.15s;
    }
    .speed-btn.active { border-color: var(--purple); color: var(--purple); background: rgba(124,110,247,0.12); }

    /* Loop control */
    .loop-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .loop-time {
      font-size: 11px; color: var(--green); font-weight: 600;
      background: rgba(90,216,166,0.1); border-radius: 6px; padding: 3px 8px;
      min-width: 42px; text-align: center;
    }
    .loop-time.empty { color: var(--text2); background: var(--bg3); }

    .icon-btn {
      display: flex; align-items: center; justify-content: center;
      gap: 5px; padding: 6px 12px; border-radius: 20px;
      border: 1.5px solid var(--border); background: var(--bg3);
      color: var(--text); font-size: 12px; font-weight: 600; cursor: pointer;
      transition: all 0.15s; white-space: nowrap;
    }
    .icon-btn:active { transform: scale(0.96); }
    .icon-btn.loop-active { border-color: var(--green); color: var(--green); background: rgba(90,216,166,0.12); }

    /* Divider */
    .divider { height: 0.5px; background: var(--border); margin: 0 -16px; }

    /* Record section */
    .record-section { display: flex; flex-direction: column; gap: 10px; }
    .record-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 12px; border-radius: 14px; border: none; cursor: pointer;
      font-size: 14px; font-weight: 700; transition: all 0.2s;
      width: 100%;
    }
    .record-btn.idle {
      background: linear-gradient(135deg, var(--purple), #9b8dfb);
      color: #fff; box-shadow: 0 4px 16px rgba(124,110,247,0.35);
    }
    .record-btn.recording {
      background: linear-gradient(135deg, var(--red), #f7a35c);
      color: #fff; box-shadow: 0 4px 16px rgba(247,110,110,0.35);
      animation: pulse 1.2s infinite;
    }
    .record-btn.has-audio {
      background: var(--bg3); color: var(--text2);
      border: 1.5px solid var(--border);
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 4px 16px rgba(247,110,110,0.35); }
      50%       { box-shadow: 0 4px 28px rgba(247,110,110,0.6); }
    }

    /* Recording timer */
    .rec-timer { text-align: center; font-size: 11px; color: var(--red); font-weight: 600; display: none; }
    .rec-timer.visible { display: block; }

    /* Playback compare */
    .compare-row { display: flex; gap: 8px; }
    .play-btn {
      flex: 1; padding: 8px; border-radius: 12px; border: 1.5px solid var(--border);
      background: var(--bg3); color: var(--text); font-size: 12px;
      font-weight: 600; cursor: pointer; transition: all 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 5px;
    }
    .play-btn.playing { border-color: var(--orange); color: var(--orange); }
    .play-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* Phrase save */
    .phrase-section { display: flex; flex-direction: column; gap: 8px; }
    .phrase-input {
      width: 100%; background: var(--bg3); border: 1.5px solid var(--border);
      border-radius: 12px; padding: 10px 14px; color: var(--text);
      font-size: 14px; outline: none; transition: border-color 0.15s;
    }
    .phrase-input::placeholder { color: var(--text2); }
    .phrase-input:focus { border-color: var(--purple); }
    .save-btn {
      width: 100%; padding: 11px; border-radius: 12px; border: none;
      background: linear-gradient(135deg, var(--green), #3dc99a);
      color: #0d1a14; font-size: 14px; font-weight: 700;
      cursor: pointer; transition: all 0.15s;
    }
    .save-btn:active { transform: scale(0.98); }
    .save-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Toast */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--bg3); border: 1px solid var(--border);
      color: var(--text); font-size: 13px; font-weight: 600;
      padding: 10px 20px; border-radius: 24px;
      opacity: 0; transition: all 0.25s; pointer-events: none; white-space: nowrap;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .error {
      color: #fff; text-align: center; padding: 20px; font-size: 15px;
      flex: 1; display: flex; align-items: center; justify-content: center;
    }
  </style>
</head>
<body>

  <!-- Video -->
  <div id="player-wrap">
    <iframe id="player" allowfullscreen allow="autoplay; encrypted-media"></iframe>
  </div>

  <!-- Journey strip -->
  <div class="journey-strip" id="journey-strip" style="display:none">
    <div class="journey-top">
      <span class="journey-level" id="j-level">A1</span>
      <span class="journey-goal">Ціль: C2 👑</span>
    </div>
    <div class="journey-track">
      <div class="journey-fill" id="j-fill" style="width:0%">
        <div class="journey-thumb"></div>
      </div>
      <span class="journey-c2">👑</span>
    </div>
    <div class="journey-marks" id="j-marks"></div>
  </div>

  <!-- Shadowing panel -->
  <div class="shadow-panel">

    <!-- Speed -->
    <div>
      <div class="panel-label" style="margin-bottom:8px">Швидкість</div>
      <div class="speed-row">
        <div class="speed-btns">
          <button class="speed-btn" data-rate="0.5">0.5×</button>
          <button class="speed-btn" data-rate="0.75">0.75×</button>
          <button class="speed-btn active" data-rate="1">1×</button>
          <button class="speed-btn" data-rate="1.25">1.25×</button>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Loop -->
    <div>
      <div class="panel-label" style="margin-bottom:8px">Петля фрази</div>
      <div class="loop-row">
        <button class="icon-btn" id="btn-start">⏮ Початок</button>
        <span class="loop-time empty" id="loop-start-display">--:--</span>
        <button class="icon-btn" id="btn-end">⏭ Кінець</button>
        <span class="loop-time empty" id="loop-end-display">--:--</span>
        <button class="icon-btn" id="btn-loop">🔁 Петля</button>
        <button class="icon-btn" id="btn-loop-clear" style="color:var(--red);border-color:rgba(247,110,110,0.3)">✕</button>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Record -->
    <div class="record-section">
      <div class="panel-label">Shadowing — запиши себе</div>
      <button class="record-btn idle" id="record-btn">🎙 Почати запис</button>
      <div class="rec-timer" id="rec-timer">● REC <span id="rec-secs">0:00</span></div>
      <div class="compare-row">
        <button class="play-btn" id="play-original" disabled>▶ Оригінал</button>
        <button class="play-btn" id="play-my" disabled>▶ Мій голос</button>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Save phrase -->
    <div class="phrase-section">
      <div class="panel-label">Зберегти фразу в картотеку</div>
      <input class="phrase-input" id="phrase-input"
             placeholder="Напиши фразу англійською…" type="text" maxlength="200">
      <button class="save-btn" id="save-btn" disabled>💎 Зберегти фразу</button>
    </div>

  </div>

  <div class="toast" id="toast"></div>

  <!-- YouTube IFrame API -->
  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    Telegram.WebApp.ready();
    Telegram.WebApp.expand();

    const params  = new URLSearchParams(window.location.search);
    const videoId = params.get("v");
    const dataRaw = params.get("d");

    /* ── Toast ── */
    function showToast(msg, dur = 2000) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), dur);
    }

    /* ── YouTube Player ── */
    let ytPlayer = null;
    let loopStart = null, loopEnd = null, loopActive = false;
    let loopInterval = null;

    if (!videoId) {
      document.getElementById("player-wrap").innerHTML =
        "<div class='error'>Відео не знайдено.<br>Поверніться в бот.</div>";
    }

    window.onYouTubeIframeAPIReady = function() {
      if (!videoId) return;
      ytPlayer = new YT.Player("player", {
        videoId,
        playerVars: { autoplay: 1, rel: 0, modestbranding: 1 },
        events: {
          onReady() {},
          onStateChange(e) {}
        }
      });
    };

    function fmt(sec) {
      if (sec == null) return "--:--";
      const m = Math.floor(sec / 60), s = Math.floor(sec % 60);
      return m + ":" + String(s).padStart(2, "0");
    }

    /* Speed */
    document.querySelectorAll(".speed-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".speed-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        const rate = parseFloat(btn.dataset.rate);
        if (ytPlayer && ytPlayer.setPlaybackRate) ytPlayer.setPlaybackRate(rate);
      });
    });

    /* Loop */
    document.getElementById("btn-start").addEventListener("click", () => {
      if (!ytPlayer) return;
      loopStart = ytPlayer.getCurrentTime();
      document.getElementById("loop-start-display").textContent = fmt(loopStart);
      document.getElementById("loop-start-display").classList.remove("empty");
      showToast("Початок петлі: " + fmt(loopStart));
    });

    document.getElementById("btn-end").addEventListener("click", () => {
      if (!ytPlayer) return;
      loopEnd = ytPlayer.getCurrentTime();
      document.getElementById("loop-end-display").textContent = fmt(loopEnd);
      document.getElementById("loop-end-display").classList.remove("empty");
      showToast("Кінець петлі: " + fmt(loopEnd));
    });

    document.getElementById("btn-loop").addEventListener("click", () => {
      if (loopStart == null || loopEnd == null) {
        showToast("Спочатку встанови початок і кінець 👆"); return;
      }
      loopActive = !loopActive;
      const btn = document.getElementById("btn-loop");
      btn.classList.toggle("loop-active", loopActive);
      btn.textContent = loopActive ? "🔁 Стоп" : "🔁 Петля";

      clearInterval(loopInterval);
      if (loopActive) {
        if (ytPlayer) ytPlayer.seekTo(loopStart, true);
        loopInterval = setInterval(() => {
          if (!ytPlayer || !loopActive) return;
          const cur = ytPlayer.getCurrentTime();
          if (cur >= loopEnd) ytPlayer.seekTo(loopStart, true);
        }, 300);
        showToast("Петля ввімкнена 🔁");
      } else {
        showToast("Петля вимкнена");
      }
    });

    document.getElementById("btn-loop-clear").addEventListener("click", () => {
      loopStart = loopEnd = null; loopActive = false;
      clearInterval(loopInterval);
      document.getElementById("loop-start-display").textContent = "--:--";
      document.getElementById("loop-end-display").textContent   = "--:--";
      document.getElementById("loop-start-display").classList.add("empty");
      document.getElementById("loop-end-display").classList.add("empty");
      document.getElementById("btn-loop").classList.remove("loop-active");
      document.getElementById("btn-loop").textContent = "🔁 Петля";
    });

    /* ── Recording ── */
    let mediaRecorder = null, audioChunks = [], audioBlob = null, audioURL = null;
    let recInterval = null, recSeconds = 0;
    let isRecording = false;

    const recordBtn    = document.getElementById("record-btn");
    const recTimer     = document.getElementById("rec-timer");
    const recSecs      = document.getElementById("rec-secs");
    const playOriginal = document.getElementById("play-original");
    const playMy       = document.getElementById("play-my");

    recordBtn.addEventListener("click", async () => {
      if (!isRecording) {
        // Start recording — loop back to start
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          if (loopActive && loopStart != null && ytPlayer) ytPlayer.seekTo(loopStart, true);

          audioChunks = [];
          mediaRecorder = new MediaRecorder(stream);
          mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
          mediaRecorder.onstop = () => {
            audioBlob = new Blob(audioChunks, { type: "audio/webm" });
            audioURL  = URL.createObjectURL(audioBlob);
            stream.getTracks().forEach(t => t.stop());
            recordBtn.className = "record-btn has-audio";
            recordBtn.textContent = "🔄 Записати ще раз";
            playMy.disabled = false;
            playOriginal.disabled = false;
            showToast("Запис збережено ✅");
          };
          mediaRecorder.start();
          isRecording = true;
          recSeconds = 0;
          recTimer.classList.add("visible");
          recSecs.textContent = "0:00";
          recInterval = setInterval(() => {
            recSeconds++;
            const m = Math.floor(recSeconds/60), s = recSeconds%60;
            recSecs.textContent = m + ":" + String(s).padStart(2,"0");
            if (recSeconds >= 120) stopRecording(); // max 2 min
          }, 1000);

          recordBtn.className = "record-btn recording";
          recordBtn.textContent = "⏹ Зупинити";
        } catch(e) {
          showToast("Дозволь доступ до мікрофону 🎙");
        }
      } else {
        stopRecording();
      }
    });

    function stopRecording() {
      if (mediaRecorder && isRecording) {
        mediaRecorder.stop();
        isRecording = false;
        clearInterval(recInterval);
        recTimer.classList.remove("visible");
      }
    }

    /* ── Playback compare ── */
    let origAudio = null, myAudio = null;

    playOriginal.addEventListener("click", () => {
      if (!ytPlayer) return;
      if (loopStart != null) ytPlayer.seekTo(loopStart, true);
      ytPlayer.playVideo();
      playOriginal.classList.add("playing");
      playOriginal.textContent = "▶ Грає…";
      const dur = loopEnd != null && loopStart != null ? (loopEnd - loopStart) : 5;
      setTimeout(() => {
        if (loopActive) {} else ytPlayer.pauseVideo();
        playOriginal.classList.remove("playing");
        playOriginal.textContent = "▶ Оригінал";
      }, dur * 1000);
    });

    playMy.addEventListener("click", () => {
      if (!audioURL) return;
      if (myAudio) { myAudio.pause(); myAudio = null; }
      myAudio = new Audio(audioURL);
      playMy.classList.add("playing");
      playMy.textContent = "▶ Грає…";
      myAudio.play();
      myAudio.onended = () => {
        playMy.classList.remove("playing");
        playMy.textContent = "▶ Мій голос";
      };
    });

    /* ── Save phrase ── */
    const phraseInput = document.getElementById("phrase-input");
    const saveBtn     = document.getElementById("save-btn");

    phraseInput.addEventListener("input", () => {
      saveBtn.disabled = phraseInput.value.trim().length < 3;
    });

    saveBtn.addEventListener("click", () => {
      const phrase = phraseInput.value.trim();
      if (!phrase) return;
      Telegram.WebApp.sendData(JSON.stringify({ action: "save_phrase", phrase }));
      showToast("💎 Фразу відправлено в картотеку!");
      phraseInput.value = "";
      saveBtn.disabled = true;
    });

    /* ── Journey strip ── */
    if (dataRaw) {
      try {
        const D      = JSON.parse(decodeURIComponent(dataRaw));
        const levels = D.levels || ["A1","A2","B1","B2","C1","C2"];
        const grammar= D.cefr_grammar || {};
        const mastered = D.mastered || [];
        const curLevel = D.level || "A1";
        const curIdx   = levels.indexOf(curLevel);

        const allTopics = levels.flatMap(l => (grammar[l] || []));
        let doneSoFar   = 0;
        for (let i = 0; i <= curIdx; i++) {
          const lvlT = grammar[levels[i]] || [];
          doneSoFar += lvlT.filter(t => mastered.includes(t)).length;
        }
        const pct = allTopics.length ? Math.round(doneSoFar / allTopics.length * 100) : 0;

        document.getElementById("journey-strip").style.display = "block";
        document.getElementById("j-level").textContent = curLevel;
        document.getElementById("j-fill").style.width  = pct + "%";

        const marksEl = document.getElementById("j-marks");
        levels.forEach(lvl => {
          const topics = grammar[lvl] || [];
          const done   = topics.filter(t => mastered.includes(t)).length;
          const isAll  = done === topics.length && topics.length > 0;
          const isCur  = lvl === curLevel;
          const el     = document.createElement("span");
          el.className = "journey-mark" +
            (isAll ? " done" : "") +
            (isCur && !isAll ? " current" : "") +
            (lvl === "C2" && !isAll ? " goal" : "");
          el.textContent = isAll ? lvl + "✓" : lvl;
          marksEl.appendChild(el);
        });
      } catch(e) {}
    }
  </script>
</body>
</html>
